body:
  text: 春秋師説春秋類提要臣等謹按春秋師説三卷元趙汸撰汸嘗師九江黄澤其初一再登門得六經疑義十餘條以歸已復往留二載得口授六十四卦大義與魯春秋之要故題曰師説明不忘所自也汸作左傳補注序曰黄先生論春秋學以左丘明杜元凱為主又作澤行狀述澤之言曰説春秋須先識聖人氣象則一切刻削煩碎之説自然退聴又稱甞考古今風俗之不同為文十餘通以見虚詞説經之無益葢其學有本原而其論則持以和平多深得聖人之㫖汸本其意類為十一篇其門人金居敬又集澤思古十吟與呉澂二序及行狀附録于後行狀載澤説春秋之書有元年春王正月辨筆削本㫖諸侯取女立子通考魯隠不書即位義殷周諸侯禘祫考周廟太廟單祭合食説作丘甲辨春秋指要葢即所謂為文十餘通者朱彛尊經義考又載有三傳義例考今皆不傳惟賴汸此書尚可識黄氏之宗㫖是亦讀孫覺之書得見胡瑗之義者矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:45cb85192e9c91d3ae3391a7b4ebbda2fbbbcedf7576b68585c22d1909ada6c9
