body:
  text: 春秋趙氏集傳十五卷屬辭十五卷左氏傳補注十卷師説三卷皆居敬所校定始資中黃先生以六經復古之説設教九江嘗謂近代大儒繼出而後朱子四書之教大行然周易春秋二經實夫子手筆聖人精神心術所存必盡得其不傳之旨然後孔門之教乃備每患二經學者各以才識所及求之苟非其人雖問弗答其所告語亦皆引而不發姑使自思是以及門之士鮮能信從領會者而當世君子亦莫克知之唯臨川吳文正公獨敬異焉趙先生始就外傅受四書即多疑問師答以初學毋過求意殊不釋夜歸别室取朱子大全集語類等書讀之如是者數年覺所疑漸解慨然有負笈四方之意乃往九江見黃先生稟學焉盡得其所舉六經疑義千餘條以歸所輯春秋師説蓋始於此嘗往淳安質諸教授夏公夏公殊不謂然乃為言其先君子安正先生為學本末甚悉久之先生復念黃先生髙年平生精力所到一旦不傳可惜也復如九江黃公乃授以學春秋之要居二嵗請受易得口授六十四卦卦辭大義後夏公教授洪都先生再往見焉夏公問易象春秋書法如何先生以所聞對夏公猶以枉用心力為戒特出其夏氏先天易書曰此羲易一大象也又曰吾先人遺書當悉付子矣先生敬起謝之然於二經舊説訪求考索未嘗少後也遂如臨川見學士雍郡虞公公與黃先生有世契一見首問黃公起居先生間日為言黃先生著書大意與夏公所以不然者時江西憲私試請題虞公即擬策問江右先賢名節文章經學及朱陸二氏立教所以異同先生識其意即具對卒言劉侍讀有功聖經及舉朱子去短集長之説虞公大善之授館於家以所藏書資其玩索袁公誠夫吳文正公髙第弟子也集其師説為四書日録義多與朱子異求先生校正其書先生悉擲其新意極論得失異同與誠夫袁公多所更定至論春秋則確守師説不變先生亦以所得未完非口舌可辨自是絶不與人談嘗以為春秋名家數十求其論筆削有據依無出陳氏右者遂合杜氏考之悉悟傳注得失之由而後筆削義例觸類貫通縱橫錯綜各有條理此左氏傳補注所由作也既歸故山始集諸家説有合於經者為春秋傳又恐學者梏於舊聞因陋就簡於交互之義未能遽悉乃離經析義分為八類辨而釋之名曰春秋屬辭蓋集傳以明聖人經世之志屬辭乃詳著筆削之權二書相為表裏而春秋本旨煥然復明然後知六經失傳之旨未嘗不可更通黃先生有志而未就者庶可以無憾惜乎書成而黃先生與諸公皆謝世久矣雖然習實生常雖賢者不能自免黃先生力排衆説創為復古之論使人思而得之其見卓矣使非先生蚤有立志公聽並觀潛思默識自任不回則亦豈能卒就其業也哉當先生避地古朗山時居敬與妻姪倪尚誼實從山在星溪上遊髙寒深阻人迹幾絶故雖疾病隱約而覃思之功日益超詣有不自知其所以然者因得竊聞纂述之意與先難後獲之由乃備述其説于末簡庶有志是經者毋忽焉其夏氏先天易説先生嘗以質諸虞公虞公復以得於前輩者授之於是遂契先天內外之旨而後天上下經卦序未易知也嘗得廬陵蕭漢中氏易説以八卦分體論上下經所由分與序卦之意如示諸掌然上無徵於羲皇成卦之序下無考於三聖彖象之辭則猶有未然者及春秋本旨既明乃悟文王據羲皇之圗以為後天卦序采夏商之易以成一代之經蓋與孔子因魯史作春秋無異然後知黃先生所謂周易春秋經旨廢失之由有相似者蓋如此故以思古吟等篇及行狀附于師説之後庶幾方來學者有所感發云爾學生金居敬謹識
