body:
  text: 春秋師説卷上元趙汸撰論春秋述作夲旨前漢藝文志凡春秋二十三家古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事事為春秋言為尚書周室既微載籍殘缺仲尼思存前聖之業以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定歷數藉朝聘以正禮樂有所褒諱貶損不可書見口授弟子弟子退而異言丘明恐弟子各安其意以失其真故論夲事而作傳明夫子不以空言説經也及末世口説流行故有公羊榖梁鄒夾之傳四家之中公羊榖梁立於學官澤謂此篇敘孔子作春秋與左丘明觀國史之説大槩得之又謂丘明論夲事而作傳明夫子不以空言説經此説尤當杜氏云凡策書皆有君命謂如諸國之事應書于䇿須先稟命於君然後書如此則應登䇿書事體甚重又書則皆在太廟如孟獻子書勞于廟亦其例也據䇿書事體如此孔子非史官何由得見國史䇿文與其簡牘夲末考見得失而加之筆削蓋當時史法錯亂魯之史官以孔子是聖人欲乘此機托之以正書法使後之作史者有所依據如此則若無君命安可修改史官若不稟之君命安敢以國史示人據夫子正樂須與太師師襄之屬討論詳悉然後可為不然則所正之樂如師摯之始關雎之亂洋洋乎盈耳時君時相謂之全不聞知可乎又哀公使孺悲學士喪禮於孔子士喪禮於是乎書則其餘可知也蓋當時魯君雖不能用孔子至於托聖人以正禮樂正書法則決然有之如此則春秋一經出於史官先稟命於君而後贊成其事也夫子見周衰紀綱廢壞平王以下王室遂微自此伯者迭興其勢盛強雖桓文有輔翼尊周之功然為義不盡寡弱王室計其一時之盛雖若可觀然大抵苟且一時誠不足以善其後是故齊之伯也釋晉里克及魯慶父弒君之罪而不誅君臣之道遂以陵替晉之伯也削王室之地召王于溫而使諸侯朝之名分之壞孰有甚於此者襄公以後雖數世為諸侯長然觀其施設大抵皆緩篡弒之罪縱人臣之惡開禍亂之門逮其末世釁起蕭牆堅冰已至於是韓趙魏智氏力敵而分晉之兆乃成田氏得志於齊而篡滅之惡已著魯之公室亦遂衰微大夫失權陪臣執命推原其弊之始雖欲不罪齊桓晉文得乎觀齊晉之寬縱不討弒君之罪後之子孫亦因此而亡則報應之理曷嘗不明利欲之末流其害如此嗚呼齊晉之事既已莫救而來者效尢不已天下之大有臣無君禮義消亡風俗頺弊日趨日下莫知所止聖人憂焉逺則激於陳恆近則傷於麟獲雖有變魯至道興東周之志而未嘗有一日之權是以不獲已而觀乎國史以作春秋書既成而亂臣賊子懼焉則其效驗著於當時而功用行乎百世禮以濟其怒仁以行其權用大智而天下後世莫能知其心即堯舜之心其事近乎湯武之事不動聲色而使讀者莫不敬懼心服不言而化不疾而速不怒而威揭綱常於一朝敘彛倫於萬世方諸湯武顧不盛歟周自平王東遷微弱不振至孔子時微弱已甚孔子雖聖人然在當時不過魯之臣子周之陪臣也憫周之衰而拯救之故托魯史以明大義於天下以周之法而治周之諸侯爾吾觀聖人拳拳於周室常有興東周之心而於文王周公蓋夢想若將見之其心於周室至矣學者當虛心以求聖人則庶幾有以得聖人之心而後春秋之正説可得而伸也史紀事從實而是非自見雖隱諱而是非亦終在夫子春秋多因舊史則是非亦與史同但有隱微及改舊史處始是聖人用意然亦有止用舊文而亦自有意義者大抵聖人未嘗不褒貶而不至屑屑焉事事求詳若後世諸儒之論也孟子曰其義則丘竊取之矣竊取者謂無其位而不敢當故謙辭也二百四十二年者夫子之春秋自伯禽至魯滅史官所書者魯春秋也王者賞功罰罪雖或不當然猶是號令足以及天下名分未至大壞夏商皆然惟東周自平王微弱不復能制馭諸侯而後上下之分陵替禮義幾於澌盡故孔子作春秋平王以前不復論者以其時天子能統諸侯故也始於平王者所以救周室之衰微而扶植綱常也春秋皆是處變常者易處而變者難處故春秋非聖人不能作子曰可與共學未可與適道可與適道未可與立可與立未可與權此是看春秋之要孔門髙弟惟顔曾學力已到庶幾可與權者此外如有子亦頗知通變遊夏雖髙弟却恐未及春秋兼正變然大抵變多於正多是從權故非聖人不能作非孟子諸大賢不能透徹公榖費盡心思無大益也春秋夲是一貫之道夫子以一理而裁萬事洪纎髙下各有攸當而學春秋者竟未知其為一貫也春秋如正例變例之實此是澤破近代諸儒春秋不用例之説三傳皆用例雖未必盡合聖人然不中不逺近時説者則以為夫子春秋非用例若如此則夫子作春秋止是隨事記録止如今人之寫日記簿相似有何意義惟其有正例變例方可推求聖人夲意且如某年某時某月某日某國某人滅某國此分明是惡其以無罪滅人之國又如文十四年九月甲申公孫敖卒于齊此人雖有罪然是公族觀聖人之意是以恩録不以罪殺恩所以示敦睦宗族忠厚之道亦是以二子故此是變例如此看方稍得聖人之心若説聖人止備録使人自見則但是史官皆可為何以見得春秋非聖人不能作又嘗見近世作宰相者用人之際不肯拘例曰若用例則一堂吏亦可為宰相此説固是然亦偶遇可以不拘例之人則可若一切皆不用例則有司又何所守乎春秋之不可無例亦猶是也哀公十四年春西狩獲麟夫子感麟之出不以其時虛其應而失其歸又傷已之不遇無以自見於世乃據魯史而作春秋以治亂臣賊子姦名犯分之罪其夏適有陳恆弒簡公之事夫子若釋而不問何以誅姦凶於既往遏亂賊於方來乎所以雖已致仕不敢憚煩特重其事沐浴而朝告於三子請正討賊之義魯之君臣雖不從然亂臣賊子始知所懼而後討賊之義例始定然事雖不行而為惡者已知所懼惴惴焉亦惟恐人之議已是夫子一告之頃已足以匡天下之亂矣此沐浴告君所以為二百四十二年討賊之義例也陳恆之事魯若任孔子亦不得不用魯衆加齊半之説蓋聖人德義雖孚於人然亦須臨事而懼好謀而成豈得全然不論兵力故當斟酌事情與強弱之勢以告君也哀公十四年西狩獲麟孔子始修春秋明年子路卒又明年孔子卒則是此書成得年歲間而孔子沒也當時門弟子見者必少蓋此書亦難以泛然視人想夫子沒後弟子方見之論魯史策書遺法魯史春秋有例夫子春秋無例非無例也以義為例隱而不彰也惟其隱而不彰所以三傳各自為説若左氏所説止是史官所守之法春秋凡例夲周公之遺法故韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王此時未經夫子筆削而韓宣子乃如此稱贊者見得魯之史與諸國迥然不同故也赴告策書諸所記注多違舊章此杜氏説大抵春秋時史法頗難為史官者亦只當直書中間違禮得禮皆有之亦是時使之然記事者只得如是不可律以夫子書法見夫子簡嚴便謂史法非是也夫子之春秋不可以史法觀後世作史者只當用史法不可模擬聖人也胸中權度不如聖人則豫奪不得其正矣故作史惟當直書為得體夫子春秋只是借二百四十二年行事以示大經大法於天下故不可以史法觀之惠公以前春秋其不合於典禮者尚少故夫子截自惠公以後者所以撥亂也春秋書法自書契以來所無舊史固是周公之遺法然常法也王政不綱而後怪誕百出弒父與君無所不有而紀綱法度俱已蕩然分限既踰無一合於古者而史法始難乎紀載矣若非聖人刪修之則二百四十二年之行事是非得失淆亂穢雜而無所折𠂻矣天下後世安所取正哉凡史官書法與刑官論刑大體固不異如趙盾之事以法言之則穿為元惡盾若不知情當只坐中途聞難而復不討賊為罪然此罪亦已應誅蓋元惡若與盾非族黨盾亦不能逃匿庇凶逆之罪其迹亦當與知情同今穿既是盾之族黨盾若誅穿尚難以自明况庇而不誅則盾與穿同惡同罪矣以位言之則盾為執政之卿以族屬言之則盾為從父是固不可得而末減者若以董狐書法言之則為國正卿亡不出境反不討賊不論知情與否皆同弒君書穿則盾之罪不明書盾則與穿同論史法與論刑其實亦不大相逺也春秋以前禮法未廢史所書者不過君即位君薨葬逆夫人夫人薨葬大夫卒有年無年天時之變郊廟之禮諸侯卒葬交聘會朝大抵不過如此爾無有伐國滅國圍城入某國某邑等事也其後禮法既壞史法始淆亂如隱公元年除書及邾宋盟公子益師卒外其餘皆失禮之事如不書即位是先君失禮為魯亂之夲鄭伯克假是兄不兄弟不弟天王歸仲子之賵則失禮顯然祭伯來則不稱使舉一年如此則二百四十二年可知如此則夫子春秋安得不作春秋所以難看乃是失却不修春秋若有不修春秋互相比證則史官記載仲尼所以筆削者亦自顯然易見三桓是桓公文薑之子而春秋書法於文薑不少恕如夫人薑氏會齊侯夫人薑氏享齊侯夫人薑氏如齊如莒其子孫見此豈有不怒然却又如此書此便是難説澤嘗謂此處是看春秋緊關若透得此關則春秋甚易説不透此關則縱饒説得好亦多是強説而已説春秋必須兼考史家記載之法不可専據經文也若專據經文而不考史則如滅項之類如何見得史者事也經者理也先儒於春秋亦多所益而莫能總其要歸其於史官記載之體聖人筆削之法蓋未有兼得之者是以或得之於經則失之於史得之於史則失之於經也二百四十二年者夫子之春秋自伯禽至魯滅史官所書者魯春秋也論三傳得失孔子作春秋以授史官及髙弟在史官者則丘明作傳在髙弟者則一再傳而為公羊髙榖梁赤在史官者則得事之情實而義理間有訛在髙弟者則不見事實而往往以意臆度若其義理則間有可觀而事則多訛矣酌而論之則事實而理訛後之人猶有所依據以求經旨是經夲無所損也事訛而義理間有可觀則雖説得大公至正於經實少所益是經雖存而實亡也况未必大公至正乎使非左氏事實尚存則春秋益不可曉矣故舍事實而求經自公羊榖梁以後又不知其幾公羊榖梁也然則春秋之道何時而可明邪左丘明或謂姓左丘名明非傳春秋者傳春秋者蓋姓左而失其名澤謂去古既逺此以為是彼以為非又焉有定論今以理推之則夫子修春秋蓋是遍閲國史策書簡牘皆得見之始可筆削雖聖人平日於諸國事已素熟于胸中然觀聖人入太廟每事問蓋不厭其詳審况筆削春秋將以垂萬代故知夫子於此尤當詳審也又䇿書是重事史官不以示人則他人無由得見如今國史自非嘗為史官者則亦莫能見而知其詳又夫子未歸魯以前未有修春秋之意自歸魯以後知其已老道之不行始志於此其作此經蓋不過時嵗間耳自非備見國史其成何以如是之速哉竊謂夫子聖德已孚於人魯之春秋雖史官亦知其舛謬非聖人莫能刋正是以適投其機而夫子得以筆削也觀夫子與魯樂官論樂則知樂之所以正亦樂官有以推贊之又或出於時君之意亦未可知也然䇿書是事之綱不厭其略特其節目之詳必須熟於史者然後知是以此書若以示學者則雖髙弟亦猝未能曉若在史官則雖亦未能盡得聖人旨意然比之於不諳悉夲末者大有徑庭矣故竊獨妄意從杜元凱之説以為左氏是當時史官篤信聖人者雖識見常不及然聖賢大分亦多如此左氏是史官曾及孔氏之門者古人是竹書簡帙重大其成此傳是閲多少文字非史官不能得如此之詳非及孔氏之門則信聖人不能如此之篤左氏乃是春秋時文字或以為戰國時文字者非也今考其文自成一家真春秋時文體戰國文字粗豪賈誼司馬遷尚有餘習而公羊榖梁則正是戰國時文字耳左氏固是後出然文字豐潤頗帶華艷漢初亦所不尚至劉歆始好之其列於學宫最後大扺其文字近禮記而最繁富耳後漢書成於范煜之手便有晉宋間簡潔意思堯舜三代之史成於司馬遷便有秦漢間粗豪意思若以為左氏是戰國時人則文字全無戰國意思如戰國書戰伐之類皆大與左傳不同如所謂拔某城下某邑大破之即急擊等字皆左傳所無如將軍字亦只後來方一見蓋此時將軍之稱方著耳臘字考字書别無他義只是臘祭耳從巤者蓋取狩獵為義秦以前已有此字已有此名如三王之王不知帝世已有此名至禹始定為有天下之稱也後儒不深思則謂秦始稱臘學者便據此以疑左傳此何可信哉韋昭謂古車字音尺奢無居音其誤皆類此戴宏序春秋傳授云子夏傳與公羊髙髙傳與其子平平傳與其子地地傳與其子敢敢傳與其子壽至漢景帝時壽乃共弟子齊人胡母子都著於竹帛據此則公羊氏五世傳春秋若然則左氏是史官又當是世史其末年傳文亦當是子孫所續故通謂之左氏傳理或當然榖梁如蔡人殺陳他曰何以知其是陳君也兩下相殺不道又如二年宋督弒其君及其大夫孔父亦曰何以知其先殺孔父子既死父不忍稱其名臣既死君不忍稱其名以是知君之纍之也凡若此類皆是用測度之辭蓋是當來得之傳聞不曾親見國史是國史難得見之一驗又公羊是齊人齊亦有國史而事亦訛謬蓋國史非人人可見公榖皆是有傳授然自傳授之師已皆不得見國史矣故知左氏作傳必是史官非史官則不能如此又是世官故末年傳文當是其子孫所續公羊襄公元年已丑葬我小君齊薑齊薑與穆薑則不知其為宣夫人歟成夫人歟他如此類甚多此乃不見國史之明驗故二傳事多不可據近世學者以左氏載楚事頗詳則以左氏為楚人此執一偏之説而未嘗虛心以求故也凡作史必須識大綱領周雖微弱終為天下宗主故當時作史必須先識周事其次莫如晉楚國大而各有所屬若得晉楚之事則諸國之事自然易舉矣然晉楚之事詳於周者蓋周室微弱號令不及於諸侯而事權皆出於晉其次則楚故晉楚之事多於周也他國如齊如鄭如宋如衛事亦最詳齊是魯鄰鄭亦同姓事關齊晉楚諸大國宋是先代之後衛是兄弟之國交際之分深故事亦最詳也如秦如吳事頗略後來吳事稍詳者漸以強大侵陵中國而魯常與之會盟故也當來丘明作傳以明孔子之經若不博采諸國之史則此傳何由可成今却以為載楚事詳遂謂之楚人其亦未嘗深求其故祇見其可笑耳今止以晉楚之事言之則城濮之戰邲之戰鄢陵之戰及趙武屈建公子圍為宋之盟均載晉楚之事辭意之間多與晉而抑楚而晉自文公以後世為盟主其與諸國盟會事最為多而謂楚事最詳其亦不思之甚凡疑左氏他説似此甚多然亦不足深辨也説春秋者多病左氏浮誇然其間豈無真實苟能略浮誇而取真實則其有益於經者亦自不少也學者最忌雷同是非世人多譏左氏而澤於左氏往往多有所得故不敢非之左氏之作傳也後人見其有乖忤處多不信其傳豈可因其短而棄所長哉若欲舍傳以求經非惟不知左氏亦並不知經魯隱公不書即位榖梁謂之讓桓不正左氏以為攝而不明斷其是非然既謂之攝是有先君之命非諸大夫扳而立之也應立而讓則謂之讓不應立故謂之攝桓母素貴稱夫人故也惠公晚年冉娶雖是失禮然須是有王命然後可以成其為夫人所以經書天王使宰咺來歸惠公仲子之賵王室知有仲子者是將娶之時已請命于王王之此舉雖亦失禮然乃是為桓公之地以見桓母素貴則桓公當立耳又據左氏惠公之薨也有宋師太子少葬故有闕是以改葬如此則惠公已立桓公為太子隱公之立不過承父命攝以奉桓安得謂之讓哉宋武公生仲子以手文之瑞故魯欲聘為夫人然惠公前已娶孟子蓋已數十年及晚而再娶仲子既不可有兩適又難同姪娣又非是待年於父母家當時宋人蓋要魯以為夫人魯之娶仲子蓋已先告於天子若不獲命則宋人必不與天子既許魯乃以夫人禮聘之則仲子必素貴與隱母不同此雖失禮然却是事之情實何休以為隱母是左媵桓母是右媵亦不過測度之辭此亦非是隱母乃是媵桓母是失禮再娶耳既娶而生桓公未幾而惠公沒隱公之攝實出於先君之命使之攝而俟桓長傳稱惠公之薨有宋師太子少是惠公之時桓公已正太子之位夫桓公既已正太子之位則隱公之攝乃父命明矣然則隱雖欲不讓烏得而不讓乎又宋魯為婚姻而惠公未葬宋來伐喪此何故也豈非以桓公仲子故邪夫太子少而隱公立斯固宋人之所疑者桓公內有國人歸嚮之情外有宋之援使隱果不賢亦未敢遽奪之也而况隱之志夲能讓乎榖梁以為讓桓不正此不知當時事情若在當時必導隱公為亂非殺桓公母子不可得國而隱亦終必不免此榖梁春秋開卷第一義最謬者也若從左氏公羊則合事情而隱之賢終可取榖梁謂隱公不當讓此不逹禮之變而亦不知當時事情儒者生於後世而追斷古事往往不合者不逹事情故也使榖梁生於斯時則親見當時國人之情知惠之貴桓見桓母之存而國人貴之隱公母事之而先君立桓之命人之所知隱公讓桓之舉實為能遵先君之命則自不敢如此説矣若使穀梁生此時見此事而左右隱公使之自立則是導人為不義此説一萌不論事之濟否而隱公讓桓之美意壞盡矣故儒者若欲追論古人必若身親見之親當之則自然合事情而無過論也聖人所以異於人者蓋雖一切以禮義為斷然未嘗迂逺而拂事情公羊傳曰立適以長不以賢立子以貴不以長此三代立子之法必禮經之言也公羊以尹氏為譏世卿説春秋者往往從其説而深闢左氏之妄澤以為經所書者皆是史先有其文非是夫子創書凡史書之法告則書假令果是尹氏則所以得書於魯史者以其來告故也豈有譏刺之意哉夫世卿固當時之弊然其來已久推而上之則堯舜夏商亦皆然但側微者亦逹隱德者必彰不純用世家耳世卿之弊極於周末人情亦皆厭之故有譏世卿之説然春秋治姦名犯分者耳假令果是尹氏果是周之世卿則書一尹氏之死而乃深寓譏刺之意豈不深險之甚哉古策書之體甚嚴假令果是尹氏果是天子之世卿便須考究尹氏名某既是周之卿却為何官與魯有何交故乃因卒而登載於魯之史策既已不知來歷又何以知其為譏世卿或曰尹氏者天子之公卿嘗與先君惠公有盟會故夲以名赴而變文書氏以譏之耳曰二百四十二年䇿書之薨卒惟夫人書氏即無男子書氏之例婦人所以書氏者所以别同姓若魯昭公吳孟子便不可赴同姓之國故婦人以氏為重其天子之卿大夫既卒若與魯有故而來赴只應曰某官某卒若曰赴以尹氏而不稱名則決無之若曰赴夲以名而夫子特改稱氏以譏世卿則是夫子始變動赴告䇿書之制使二百四十二年之例忽改自王臣不然則寓貶之意究屬朦朧使後人惑於男女不辨夫子斷不出此也公羊榖梁不見國史故所載之事與左氏不同亦多是臆度之辭耳公榖之訛夲非容心蓋不見事實而得之傳聞亦無足深咎但後之學者既見左傳事實則當依據而諸家説者乃更採二傳之事以釋經如尹氏卒夫人子氏薨是也夫所謂尹氏者謂天子之大夫書此者所以譏世卿也而不知當時國史本無尹氏卒之事又世卿周中世以後之通弊亦非朦朧書一尹氏所能救聖人褒貶之法豈若是深晦不明之甚哉所謂夫人子氏卒者榖梁以為是隱公之妻不知左氏據國史子氏實非隱公之妻所以知其非隱之妻者隱公當國凡事謙讓不肯自謂為君故史不書即位改葬惠公公亦弗臨衛侯來會葬亦不相見蓋皆承父之志為桓公之地既已如此無緣却以夫人禮喪其妻又况惠公即無為子娶宋女之事惠公在位久故先娶孟子後娶仲子以其是國君故也隱特庶子耳何得與父皆娶宋女乎故知説春秋者當據左氏事實不當更惑他説所以知尹氏當作君氏者此蓋是省文法猶曰君之母夫人某氏云爾既不純用夫人禮本難以書而又以君故不可不書是以變其文而書法如此所以知夫人子氏薨當是桓母者惠之末年再娶仲子惠公之薨仲子猶在仲子素貴當時臣下皆以君位當屬之桓公故隱公攝以待桓公之年長而授焉此三傳所通知則仲子之卒理應書之史䇿無沒而不書之理若據公羊以為是隱母榖梁以為是隱妻則仲子之卒不見於經是隱傲然自以為君而黜桓不得為讓國矣若據左氏則惠公末年失禮再娶娶而生桓公未幾而公薨蓋遺命使隱公攝而俟桓之長隱攝之明年桓母卒隱將成桓之為君故於桓母之卒用夫人之禮及免喪則考仲子之宫而初獻六羽焉此最為可信可據蓋由公榖不見國史未足深怪後之學者既通考三傳則當有所決擇去其害義者豈可故從不根之説以瀆亂聖經乎齊人伐衛衛人及齊人戰衛人敗績若據經文有何意義及考左氏然後知經文乃是罪齊凡左氏有益於經皆此類春秋難通者不一只如單伯送王姬經文與二傳亦不同一以為送王姬一以為逆王姬又據左傳則單伯是天子大夫據二傳則單伯是魯大夫魯使之逆王姬也此一事經傳皆異但左氏見國史則魯實無單伯實是周大夫耳然書單伯送王姬在前書築王姬之館于後却又似是單伯逆王姬為是逆而後築館焉於事亦似順此春秋所以難説及思之積一二十年然後知左氏經傳為是此處頗有曲折留以為諸生學問辨難之地夫人氏之喪至自齊杜氏曰不稱薑闕文此杜氏之失也不稱薑省文從可知耳又傳曰君子以齊人之殺哀薑為已甚矣此語亦失之哀薑以淫亂致慶父之禍兩君遭弒國幾於亡魯不能容出孫于邾安可聽其稔惡不討乎般及閔公皆其子子無討母之理然則權其宜當屬之齊故齊人殺哀薑不為過凡左氏之失類此然其事却可據不可因噎而廢食斯善讀左傳者也僖公八年秋七月禘于大廟用致夫人左傳曰禘而致哀薑焉非禮也凡夫人不薨于寢不殯于廟不赴於同不祔于姑則弗致也公羊傳曰譏以妾為妻榖梁傳曰立妾之辭三傳所説不同當以左傳為是二傳揣度不足據也案左氏哀薑私於共仲共仲因此遂欲自立及共仲弒閔公故哀薑孫于邾齊人殺之而以其尸歸故僖公立而請其尸于齊以葬此皆事之情實見于經傳者具有血脈但夫人雖得以禮葬然於禮典不應入廟與享及八年禘祭遂以夫人與享於廟因致之于莊宮左氏譏其非禮者為其不當致而致違周公之禮也夫夫人之薨焉有不在寢者不在寢非姦則亂故絶之使不得配先君與祭享此聖人所以正家謹禮垂訓於後而僖公以區區之仁違禮犯義厚則厚矣其如先君之禮法何此事本末甚完不可更從他説左傳趙盾事首尾皆實惟越竟乃免語意不備故學者多疑之若曰越竟有罪乃免則語意備矣又趙盾之罪與欒書中行偃不同書偃親為弒逆然經却又只書晉弒其君又不曾書討弒君賊當是時莫是書偃為政而别不曾討賊則弒主非書偃而何此等處雖欲不信左傳亦不可也若歐公只據經文則書偃得免於弒君之罪如此却出脫了多少惡逆之人澤於此等處用功數十年甫乃得之須俟一部春秋筆削本旨成而後其説乃定今固未可盡發其機也左氏罪在寧氏之説澤數年前猶深闢之以為甚贅及後豁然既有所悟然後知其謬誤乃在澤不在左氏然則讀書而不深思乃率意譏議古人大不可也公羊傳許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也公羊此處有斷制亦看得稍活不窒滯凡春秋最難眀者是篡弒榖梁陳殺其大夫泄冶稱國以殺殺無罪也澤謂榖梁此例則不知楚殺其大夫公子壬夫及楚殺其大夫公子側楚殺其大夫公子追舒晉殺其大夫里克晉殺其大夫胥童齊殺其大夫崔杼不知如何分别此春秋所以難説春秋所以難明者蓋春秋是事易涉訛謬今同居一城府城東之事城西忽爾妄傳况於春秋列國事最繁傳聞者有逺近詳略真偽或雜以好惡即乖其實如齊東野人之流蓋不一而足也公羊榖梁所據之事多出於流傳非見國史故二傳所載多涉鄙陋不足信但其間却有老師宿儒相傳之格言賴此二傳以傳於世辨之亦易也較之左傳記事有本末真可以發眀聖經則相去天淵矣春秋當詳考事實以求聖人筆削之旨而三傳去聖未久已多異同如魯隱公不書即位左氏公羊以為是攝榖梁以為讓桓不正三者所見各不同君氏卒左氏以為隱公之母二傳以為天子之卿夫人子氏薨一以為惠公妾母一以為桓母仲子一以為是隱公之妻遂使三世母妻不辨汨亂人倫説春秋之最謬未有甚於人倫不辨者僖公八年禘於大廟用致夫人一以為立妾母為夫人見廟一以為哀薑有罪既沒不得入廟故因大禘而致之使得與享一以為僖公立妾為妻因禘而廟見蓋此一事或以為生或以為死或以為妾母或以為妾妻或以為適母哀薑其間非無正説但為曲説所蔽耳據凡例考國史説三叛人名之類此左氏有益於經舉大義正名分君子大居正之類此公羊有益於經桓無王定無正之類此榖梁有益於經公羊名義亦多如七缺之類不可廢所謂七缺者如惠公妃匹不正隱桓之禍生是為夫之道缺澤舊未見此説却頗與之合晦菴言春秋制度大綱左氏較可據公榖較難憑又曰左氏曾見國史考事頗精又曰左傳一部載許多事未知是與不是但道理是如此又曰左氏是史學公榖是經學史學者記得事却詳朱子説三傳以為左氏見國史但義理未明公榖大義正却未見國史此言最要切又蘇子由教人讀左傳只是據其事實而以義理折衷此亦最為簡當學春秋者不可不知也論古注得失杜元凱作春秋經傳集解之外自有釋例一部凡地名之類靡不皆有此自前代經師遞相傳授所以可信而學者開口只説貴王賤伯詳內略外尊君卑臣如事物名件地理逺近風俗古今之類皆置不問如此則焉往而不踈謬乎近嘗見一家解叔孫豹救晉次于雍榆謂是譏其遷延次宿不急於救若澤解此事便須先考究雍榆地屬何國去晉魯逺近幾何凡師出裹糧所經過之國勢須假道告以救晉之故又當考究當時救晉者有幾國今經皆不書諸侯救晉而獨魯遣豹次于雍榆豈得以遷延不救為罪且夫救晉者獲貶則安居坐視者率皆可褒乎其非經旨決矣其不足取信抑又明矣推變例以正褒貶信二傳而去異端此杜元凱所得可以為法傳之萬世而無弊也蓋事之異同雖有其例而必以義為斷方與聖經不背今人却去了義字只説元凱以例説經亦可歎也杜元凱説春秋雖曲從左氏多有違背經旨處然穿鑿處却少如説春秋二字云年有四時故錯舉以為所記之名如説東宫二字杜氏却云太子謙不敢居上位故常處東宫他人於此等處必不取然澤却取之者以其説簡質正大有所包含非穿鑿之比杜元凱信左氏澤亦只是信左氏但立意却微有不同亦只是毫釐之差中間却有大相逺處年四十時周正之説已分眀至四十五六春秋忽大有所悟微而顯志而晦婉而成章盡而不汙懲惡而勸善杜氏遂分春秋之事以類相從推之以合此五者然不知有一事而備數義杜氏蓋未之思也凡此皆拘滯而失春秋之大指焉鄭世子忽復歸于鄭此是豫忽也豫忽正也世子則明當為君眀當為君則突之強暴篡奪可見矣杜氏以為貶忽非也魯僖公夫人薑氏杜氏以為是齊桓公兄弟同出于齊僖據傳則僖公即位之初距齊僖之後四十年矣元凱何不思之甚歟若以為是齊襄公女則於適母哀薑為妹父子同娶於齊襄亦恐無此理若以為是齊桓女則於事體無嫌何故經傳皆不載其事又况齊女素貴魯若無慶父之難則僖公不過庶公子耳彼豈肯嫁庶公子乎八年秋七月禘于太廟用致夫人説者遂謂立妾為妻其誣罔甚矣夫薑者齊姓僖公既未嘗娶于齊何故有薑姓娣姪立以為妻乎又禮記稱夫人之不命于矢子自魯昭公始則昭以前皆須請命于周無立妾之事又傳稱自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮如此則謂僖立妾致廟以當廟見者豈非誣罔之甚哉曰然則此夫人薑氏兩書于經者誰女也曰去古既逺雖無明文可憑然以意推之疑是子糾之女耳子糾死而其妻孥在魯僖公為庶公子年長故得聘其女焉事既在前經傳無由得見然則薑氏自與齊桓為讎但僖公却又與齊桓共修伯業以翼戴天子所以同會齊侯于陽穀又會齊桓于卞以桓公是叔父焉可無勞為其夙有讎怨故須久而後見此固無明文但以胡文定推論哀薑事例之則有可信之理耳蓋春秋是事須先考事實而後可以求經旨若不得其事之實而遽欲評論是非則如杜氏之詳密亦不免於誤也魯十二公惟莊公成公是適然獨莊公經傳皆見成公則經傳皆無明文但據杜氏以穆薑為成公母穆薑是宣公夫人則成公當是適然經既不書成公之生則杜氏之説亦未可據也又陸氏作音義十二公惟成公不書母氏蓋經傳無所據故也然又有説春秋諸侯會盟征伐多故設令是適長而始生之時君或在外亦不得行舉子之禮此又以事情知之説春秋如杜預范寧儘精詳蓋猶是推究書法有所憑依特識見尚有未到所謂差之毫釐謬以千里近世説春秋謂孔子用夏正考之三傳未嘗有夏正之意何休最好異論如黜周王魯之類甚多若果用夏正則何氏自應張大其事今其釋公羊傳亦止用周正如冬十一月有星孛于東方何氏云周十一月夏九月日在房心是也惟西狩獲麟解云河陽冬言狩獲麟春言狩者蓋據魯變周之春以為冬去周之正而行夏之時詳其説亦只謂孔子書狩於春者以周之正月二月是建子丑之月於夏時為冬故書狩夫以春而書狩此何氏所以謂之去周正而行夏時蓋緣此年不書王正月而止書春故何氏有此論然以前二百四十一年皆據周正以解公羊矣獨此年有此論亦所謂立異論之一者又案何氏云絶筆於春不書下三時者起木絶火王制作道備當授漢也又春者歲之始能常法其始則無不終竟又曰得麟之後天下血書魯端門曰趨作法孔聖沒周姬亡彗東出秦政起胡破術書紀散孔不絶子夏明日往視之血書飛為赤鳥化為白書署曰衍孔圖中有作圖制法之狀孔子仰推天命俯察時變却觀未來豫解無窮知漢當繼大亂之後故作撥亂之法以授之觀何氏此説怪誕穿鑿則無怪其於春秋之終而謂孔子改周正也然何氏亦只謂此一年耳而近世説春秋者遂謂周不改時又謂二百四十二年皆用夏正大失聖人尊王之旨豈非何氏作俑之過哉齊人取子糾殺之榖梁以為千乘之國而不能存子糾范寧序謂榖梁以不納子糾為內惡是仇讎可得而容又注引何休曰三年溺會齊師伐衛故貶而名之四年公及齊人狩于禚故卑之曰人今親納讎子反惡其晚恩義相違莫此之甚鄭君釋之曰於讎不復則怨不釋而魯釋怨屢會仇讎一貶其臣一卑其君亦足以責魯臣子其餘則同不復譏也至於伐齊納糾譏當納而不納耳此自正義不相反也寧謂讎者無時而可與通縱納之遲晚又不能全保讎子何足以惡內乎然則乾時之戰不諱敗齊人取子糾殺之皆不迂其文正書其事內之大惡不待貶絶居然顯矣二十四年公如齊親迎亦其類也惡內之言傳或失之澤謂鄭君之説雖或未備然大抵却是委曲推究與近世説春秋者不同范氏讎無時而可與通之説雖若正大然不察事之情實而失之執滯也若果不可通則此後桓公伯諸侯四十餘年率諸侯以尊王魯亦常在其中却如何説夫鳥獸行殺桓公者齊襄也齊襄之罪王法所當誅王室既不能誅魯力又不足復讎而襄公已為國人所弒則魯又如何欲遷怒餘人乎子糾桓公乃僖公之子襄公之弟聖人蓋恕魯力之不能復讎而深責其不當與讎通故已屢書而致其意矣及讎人貫盈而自罹於禍國內無主魯若於此時奉糾而立之誅其凶亂則亦庶幾可以雪恥此實無害於義惟莊公之意亦豈不欲如此然第失事機故非但無益而更取敗耳若如此看則春秋始可通而無執滯矣春秋師説卷上
