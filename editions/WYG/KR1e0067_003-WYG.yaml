body:
  text: 春秋師說卷下元趙汸撰論學春秋之要晦菴言㸔春秋且須㸔得一部左傳首尾意思通貫方能略見聖人筆削與當時事意或問扵程子曰左氏可信否曰信其可信者朱子亦曰左氏所傳春秋事恐八九分是又曰三傳唯左氏近之盖疑之中又信信之中又疑據澤一得之愚則須全信左氏事實而闕其浮誇與義理錯誤處而後春秋可說此乃簡要切實之言若且信且疑則無益矣然杜元凱深信此書而亦未見有以踰人者此則理學未精之故今生扵河洛考亭諸大儒之後理學眀矣若以此而學春秋更用丘眀元凱之功則經㫖自應卓異然伊川晦菴扵此一經乃未嘗有成說者此則不曽用得丘眀元凱工夫之故盖用得元凱工夫只可到得元凱用得丘眀工夫只可到得丘眀自有䓁第及已到得丘眀去經㫖尚隔數程到此却只須虗心静㝎涵飬然後聖人之心乃可得見及其得也則凡一切要妙之義不論大綱小目皆不出程朱平日討論意思中而其事迹亦不過據左氏見在之文未嘗有所移易變更而義理自然的當精妙今學者舍鄙言不肯従事而徒過用其心非澤之所敢知也學春秋只當以三傳為主而扵三傳之中又當據左氏事實以求聖人㫖意之所歸盖扵其中自有脉絡可尋但人自不肯細心推求爾春秋書法須考究前後異同詳略以見聖人筆削之㫖事同而書法異書法同而事異正是聖人特筆處大抵先扵夫子未修春秋前觀之然後沿流而下綱舉目隨無不脗合若只従隠公以後求之宜乎多所不通也春秋本是記載之書記事而提其綱要以著得失眀大義也學者只當考據事實以求聖人筆削之㫖然自三傳已有不同難以歸一至扵近代各信所見視三傳甚輕故晦菴先生不信諸家傳註而亦自謂春秋難說決意不觧此一經澤一得之愚以為衆說雜亂難信誠如晦菴之言然若遂以為決不可通則亦太過矣盖短中取長未嘗不可今若扵左丘眀杜預上更加向上工夫則考事既詳義理分眀亦焉有不可通之理澤既積五六十年之勤一旦大有所悟遂通聖人書法嘗謂物極則變變則自然須復其常應諸經要妙不傳之㫖天地神眀不欲使人知之則無如之何若天地神眀一旦欲使人知則澤適乘其機而悉得其說矣盖用工既深篤信聖人天理亦有時而復故也說春秋當求事情事情不得而能說春秋者未之聞也如文公十八年二月丁丑公薨扵臺下秋公子遂叔孫得臣如齊兩卿如齊雖桓公伯諸侯之時魯亦未嘗如此原其事情雖為賀恵公立謝齊㑹𦵏然亦是為立宣公之地自二卿如齊至眀年六月齊人取濟西田凡十三事而八事皆為齊而子卒夫人姜氏歸于齊公即位皆遂之為也一嵗之間書卿聘齊者六此果何為哉如此推尋則知是公子遂殺適立庶急欲求齊以㝎公位故冒喪娶齊女棄濟西田此所謂事情此所謂以經證傳亦復以傳證經也此為說春秋要法左氏雖見國史識本末然所好惡與聖人異者常多公羊榖梁大義雖有可觀而考事益踈亦非可據以求經㫖者然三傳去古未逺三家之註義例雖不同然猶勝於近代去聖久逺遂乃肆意創為新竒一切汛濫不根之說者故澤扵此每用先儒取蘓子由春秋說之意只據左氏事實而參以公榖大義其衆說不齊者每虚心以求至當之歸其不可彊通者則勿忘勿助以待理熟而自悟及其有悟則亦多在左傳中而二傳亦時有所益是以不敢輕毁傳註嘗有言曰讀書之法務要虚心勿先以一說横於胸中遇有疑處亦且存㽞不可遽執所見如公羊榖梁最難㸔盖事訛錯而義理時有可觀善者従之而可疑者闕之久之事既順序而義理亦眀然後是非可㝎古人最可取者莫如鄭康成杜元凱元凱扵義理雖隨左氏而錯然推校經傳亦最精詳但得崇信左氏事實扵經甚有功學春秋者若不出扵此而徒過用其心非澤之所敢知也說春秋當據左氏事實而兼採公榖大義此最為簡要杜元凱専修丘眀之傳以釋經此扵春秋最為有功澤之用工大略亦倣此但左氏有錯誤處必須力加辯眀庶不悖違經㫖此所謂愛而知其惡而杜氏乃一切曲従此其蔽也學春秋以考據左傳國史事實為主然後可求書法能考據事實而不得書法者亦尚有之未有不考據事實而能得書法者也孟子曰其事則齊桓晉文其文則史只就史字上看便見春秋是紀事之書學者須以考事為先考事不精而欲說春秋則失之踈矣夫考事巳精而經㫖未得尚多有之未有考事不精而能得經㫖者也又須先曉史法然後可求書法史法要精熟書法要委曲求合扵中近代解經不通遂作翻案法如老吏整備文卷雖可照刷其若情實何古人說春秋大意如公羊榖梁緊切數條之外則太史公予聞之董生一段議論甚正大無一語不好又如左氏微而顯志而晦婉而成章盡而不汙懲惡而勸善及三叛人名之類皆理眀義正春秋大意亦自可知但欲推究精宻旁通曲暢使筆削之指曉然則前之衆說俱未得為完備故春秋一經所以自秦漢以迄于今未得的當之說者正以此爾晦翁深知其故每荅門人以為不知孰為筆孰為削又公羊云其辭則丘有罪孟子亦曰罪我者春秋今讀春秋亦未見得聖人許多擔當處凡春秋所以難說者晦翁此言巳得其槩矣此是灼見諸儒之病深知聖道不可淺窺澤所以勤苦四十年孜孜汲汲晝夜以思者不過為此而已大抵先儒非是不曉大意止是推測本原未盡此經傳註已多然只當以丘眀元凱為主却更加精思别用一種工夫上泝其源下沿其流㳺心既廣冀有觸悟如此而後庶㡬真有所得及見春秋本意之渾全譬猶登泰山日觀窮咸池扶桑以覩大眀之升光輝爛然萬象昭著而宇宙間雲霾物怪各巳消散若所見果能爾則大義始眀而凡舊說之迂僻固滯淺陋怪誕之說不辯而自破静而思之雖扵民生日用未有旦暮水火之益然而教義亦已眀白真曠世之竒事也春秋固是經然本是記事且先従史㸔所以如此說者欲人考索事情推校書法事情既得書法既明然後可以辯其何以謂之經何以謂之史經史之辯既決則春秋始可通而凡古今之曲說異端不待致詰而無所遁其情矣晦翁謂春秋所以難說者如孟子所云春秋天子之事又曰孔子成春秋而亂臣賊子懼今㸔春秋便不見得何者是聖人所削亦便不見得如孟子所言晦翁之說如此澤謂如書弑逆直史所書是如此聖人所書亦是如此聖人與直史之功何以辨若果無辨則直史所書亦可以懼亂臣賊子何必聖人乎如此推尋方有意味所謂直史所書與聖人同者如趙盾弑其君崔杼弑其君二國之史已如此書其餘諸國書法亦必皆然據此則聖人果何以與直史異如是推究見得春秋果是難說則始能不惑於傳註却方别下一種工夫庶㡬看到的當處耳澤之學如立的以射立的既髙且逺故難為功今以其嘗渉歴者告人人猶疑其誕謾也凡說周易春秋既看傳註了須要換却精神心術方可若有所得自然觸機而悟其機栝亦初不離經傳中但人自不見爾正如周易先天圖在康節看自然生出許多道理在他人看只是見得伏羲布置亭當而已故凡讀書為最難世人只是通其訓詁文義扵妙處實無所契澤扵周易春秋是苦思之功思慮既極而鬼神通之非妄言也說春秋所以難者緣書法難考端緒亦不一聖人又未易知今說春秋若将二百四十二年通求其義亦未必能知春秋若将一二十年書法通看亦未是知春秋唯是止将一二事詳細推校看到的當不可移易處然後知春秋果非聖人不能作周易雖失象學春秋雖失書法然經傳中未嘗無端緒可尋但人自不曽精探力索耳若尋見端緒自然合得經㫖不患人之不従故周易春秋廢墜尚有復之理若禮則本殘闕之文遇有疑難更難考據魯隠公居攝凡事謙譲故號令亦往往不行如翬帥師是也無駭入極無駭卒挟卒皆無氏此皆謙不敢自謂為君所以如此及無駭卒則不可無氏所以始賜之故後來都無不賜氏之例唯溺㑹齊師然却是貶所以去族非不賜也凡推春秋當如此凡看春秋苟能知其大意正不必安註脚所謂得大意者如玩易必須曉卦象爻象使之透徹及識其變處則易之辭自然易曉矣春秋是事却須考事之本末而照察其情又須推原聖人所以作春秋或筆或削之指則春秋自然易知矣周易春秋是有䋲墨規矩之文不比他經學二經者若知其有䋲墨規矩則始可學此二經者若能探其㫖知其䋲墨識其規矩則雖不下註脚而經㫖亦眀澤扵春秋乃是逐事事比量錙銖計較務適於中用心既久始能純熟所以後來說易又較易盖二書雖不同而聖人之心精妙則一春秋方嚴而有温厚者在周易通變而有典常者存圎融以求之則理可得矣昔張旭學草書見舞渾脫劒器及擔夫争道而大進彼執技者猶有所感發則澤因春秋而悟易以經識經豈妄語哉澤說周易所以較易者蓋是先扵春秋已用過精神心術所以觸機易悟凡諸經最難通者周易象學春秋書法二禮祭祀大典三者其難實均以精微隠賾言之則易難扵春秋春秋難扵禮以歴代事體言之則禮難扵春秋春秋難扵易然皆聖人精神心術所寓所以三者之中但通其一則餘二者可以觸機而悟也說經欲全通甚難如易春秋須要全通諸家傳註最好者只是藉作梯級更扵傳註之上别用一種工夫虚心以求勿㤀勿助以俟理熟到得確然不可移易處則固滯始化方是真得然後可以旁及餘經不然則固滯未化不可旁通也春秋所以難看者盖是大意不㝎今欲如此主張及至入其中又不知不覺錯了大抵如開千門萬户之宮乘髙以望盡在目前巧思者觀之便知其中曲折深宻處若無目力者亦見大槩但入到中間却不論巧拙皆眼迷心惑矣伊川先生說春秋大義數十炳如日星唯時措従宜者為難知耳時措従宜四字最好但據澤看則春秋難知者固是時措従宜而易知者亦未嘗不是時措従宜也諸經如詩書大意亦可見其古註及近註不可偏廢周禮關繋古今時俗若不識古今之變則此經實不易學澤雖先従事扵易春秋然所得實自周禮始凡近世疑周禮處必竭盡其愚以發眀之既用其誠是以神眀亦若有黙相之者其後稍悟扵易春秋盖以周禮為之先也然易與春秋其難易亦不同春秋自三傳已錯去古近者尚如此況去古逺者乎大抵春秋由先儒各執所見亂說故最難識本意澤扵此書盖極其勞苦其求之未得則日夜以思粗有所得則喜得而未快則亦抑鬰久而後釋然無所滯礙然使其稍有名譽顯著扵世又安能始終用志於此久而不變哉故春秋為最難而易次之非易果易學也吉凶消長進退存亡有一㝎之理大意可得而推設令不能精微其所失未逺若春秋則事理差訛謀王㫁國者遂従而舛錯為害不小如春秋復九世之讎聖人曷嘗有此意而漢武帝執此一語遂開西北邉禍及平民殫財喪師流血千里然則春秋果可易言哉春秋非聖人不能脩盖是撥亂之書不得已而作所以有許多委曲難看古書未焚策牘具在不脩春秋一一可考諸侯之史又存則此時春秋争一半工夫所以左氏終得彷彿者是親見國史故也焚書之後舊史皆無可考則春秋自是難說但先儒於易說處却亦多失之說春秋須要推究事情使之詳盡然後得失乃見如澤說桓母仲子是恵公失禮再娶乃是推尋始見得如此所以確然自信不惑盖經書考仲子之宮初獻六羽若以仲子為適則正當祔廟不應别立宮若謂母以子貴則魯十二公非適出者尚多皆未聞為其母别立宮者别立宮止有仲子盖是嘗以夫人禮娶之故特異之也又禮記稱夫人之不命扵天子自魯昭公始如此則恵公之娶仲子盖已請命扵周室周室知有仲子所以後來天子歸其賵也如此推尋則知當來仲子歸魯是以夫人禮聘之眀矣此雖失禮然在魯之臣子則不當論澤扵春秋只是說得較平亦是推得頗盡若推得未盡則㫁㫁乎踈略矣如杜元凱亦自善於推尋只是不曽推尋得透徹所以窒滯不通推春秋之法不一而足固有一見即易知者如衛侯燬滅邢是也有思而後得者如晉侯執曹伯秦伯伐晉之類是也有思而得得而不完者如甲戌己丑陳侯鮑卒晉人執虞公之類是也有思而不可得者如顛倒宋鄭及齊崔杼弑其君光之類是也凡若此類使人徒用其思竭天下後世之精神心術而莫能通其說此說春秋所以為難說春秋者當先以經證經又其次引他經證又其次以經證傳又其次以傳證經展轉相證亦復出入諸書如此則用心宻而乖謬少矣或謂傳不可以證經此則不然夫作𫝊所以釋經若釋經而無傳又何所據傳是文卷經是結案㫁例然亦止是左傳可據若公穀則但採其義理條貫而已所謂以經證經者謂如一時不雨則書時即此便可證春秋二字齊侯逆王姬便可證單伯送王姬妾母薨𦵏便可證考仲子之宮此是經自相證次引他經證者如諸侯同盟有周禮可證九合諸侯有論語可證是也所以謂之以經證傳者如書楚公子干出奔晉便知楚圍是篡傳文不妄書𦵏莊公便知國内亂而緩𦵏書晉人執虞公便知滅虞虢之事傳文可據所謂以傳證經者謂晉侯使以殺太子申生之故來告殺在先而經書在後盖是従赴又如狄滅邢衛晉侯召王子般卒子卒之類皆當以傳文為據經文則有所諱也又如傳稱成季奔陳而經不書却只書季子來歸此是以傳證經知此四者而後可與言春秋矣說春秋如公伐齊納糾楚殺其大夫得臣衛寗喜弑其君剽此等處皆是看春秋緊關不可不知凡說春秋須先識聖人氣象要識聖人渾然醇厚凡一切峭刻煩碎之說皆除去之毋惑傳註而後聖人之㫖自眀褒貶得其當矣孔子曰人而不仁疾之已甚亂也大抵說春秋若太急廹則所謂疾惡太甚須是較平則聖人之意自見然必須推究令詳盡乃可說經當務平正不可失之偏尤不可好竒立異如春秋有貶無褒此既失之偏又是欲立異然其說自窒碍不可行徒欲得立異之名爾二百餘年豈無一人一事合道理豈可謂之全無襃乎如季子來歸既稱其字又稱來歸是喜之之辭安得彊以為貶又如晉士匄帥師侵齊聞齊侯卒乃還此亦是書其得禮但貶多而褒少則有之然又有褒中之貶貶中之褒其義不一而足不容以管窺爾說春秋當先識大意謂於二百四十二年行事之外求之若不識大意而於逐事推尋則舛謬必不少矣只如元年春王正月公羊傳云王者曷謂謂文王也此已失之拘滯若復推究其極則文王雖為周家始受命之君然居殷之世乃殷之諸侯耳文王自承殷正朔曷嘗自以建子為正乎今直以王正月為文王是改殷正朔自文王時已如此其為教義之害非小小矣故說春秋易致差錯杜元凱却云魯隠之始年周王之正月此言平正無疵杜氏於大意固亦未甚眀然較之他人則有間也經㫖舉略秋七月天王使宰咺來歸恵公仲子之賵傳曰贈死不及尸弔生不及哀豫凶事非禮也尋其事情恵公失禮再娶仲子盖嘗假寵於王命以為夫人故王室知有仲子仲子得與恵公並稱盖王室已嘗名之曰魯夫人也然失禮甚矣考仲子之宮所以得書於經者其義有二始用六佾一也仲子雖貴然桓未為君隠公能堅譲桓之志故尊桓母免喪而作宫又謀於卿大夫以定其樂舞之數此亦稀有之事二也以此二者故書盖子為君而尊其母此為常理在隠公則為賢然此事猶有可疑者妾母立宫既有㝎制則樂舞亦必有㝎數何故至仲子始㝎樂舞如此推尋又似前此妾母未嘗立宫或止是祭於寝别立宫者止有仲子所以見其始以貴聘故其終也特異其禮與又六佾始書於經則魯先君之宫皆僣用八佾眀矣及仲子立宫乃是創見故疑八佾之舞而問扵衆仲初獻六羽也以其是特立之宫故可更議其制若先君之宫則相承僣禮已久不可輕議是以獨仲子之宫用六佾焉竊謂此說頗合事情但妾母祭禮終不可見據榖梁則當築宫以祭子祭孫止然其說太簡略矣夫築宫一世而遽毁果合禮意乎故竊以為不築宫則已若築宫則亦當以親盡為㫁隠八年三月鄭伯使宛來歸祊公羊傳曰宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事于泰山諸侯皆従泰山之下諸侯皆有湯沐之邑焉何休曰有事者廵守祭天告至之禮也當沐浴潔齊以致其敬故謂之湯沐之邑也所以尊待諸侯而共其費也禮四井為邑邑方二里東方二州四百二十國凡為邑廣四十里袤四十二里取足舍止共槀榖而已澤謂據何氏止是東方諸侯耳三方従可知然則諸侯湯沐止四井而書扵經者記禮之廢有感於王室微而無復廵守也桓公八年冬祭公來遂逆王后于紀范氏曰祭公寰内諸侯為天子三公者親逆例時不親逆例月故春秋左氏說曰王者至尊無敵無親逆之禮祭公逆王后未到京師而稱后知天子不行而禮成也鄭君釋之曰大姒之家在郃之陽在渭之涘文王親逆于渭即天子親迎之眀文也天子雖尊扵其后猶夫婦夫婦判合禮同一體所謂無敵豈施此哉禮記哀公問曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後為天地宗廟社稷之主君何謂已重乎此言親迎繼先聖之後為天地宗廟社稷之主非天子則誰乎澤謂范氏說固善然天子親迎之禮終不見眀文扵古不知如何但所引文王親迎為證則文王之初載其時實諸侯耳未可據以闢左氏說也記所云繼先聖之後則凡諸侯亦孰非先聖之後乎魯衛晉蔡曹滕出扵周之文武宋把陳為先代之後大抵多是聖人之後也為天地宗廟社稷主者亦據魯祀天而言耳既用先代禮樂安知其不祀天乎凡此恐未可據以為天子親迎之證恐古者必有天子親迎之禮其後未必行況當春秋時魯君往往皆是遣卿諸侯亦已皆然當時事體自應如此不可責以舊禮況天子乎大扺春秋時敵國既多諸侯守宗廟社稷之重若一一修親迎之禮自扵事體不便禮有因人情而變者故春秋娶女雖不備禮而天子諸侯俱遣重臣亦禮之變也又當時天子諸侯其他廢禮越禮者何可勝計若扵此責之是放飯流歠而問無齒決之謂矣鄭伯突出奔鄭世子忽復歸扵鄭突不正却稱鄭伯是従其實忽已為君尚稱世子是眀其為正若皆書鄭伯則二君争國一出一入間無異事曲直莫辨故忽只書世子則突是篡可知突不貶者魯宋為之主已成為君故従其實而惡自見然則屈忽稱世子者所以伸忽也桓公子糾之事案程子之說以子糾桓公為襄公二子據左傳則云齊桓衛姬之子有寵於僖則齊桓乃僖之子襄公之弟也又案程子以桓公為兄子糾為弟據公榖及三傳之註則子糾是兄桓公是弟又荀子言桓公内行則殺兄而争國則子糾乃桓公之兄也又據古者諸侯一娶九女適夫人無子則立右媵之子右媵無子則擇諸左媵左媵無子則取扵夫人娣姪夫人娣姪無子則取扵右媵娣姪右媵娣姪無子則取扵左媵娣姪故凡立子皆是隨其母之貴賤今桓公之母與子糾之母其班序髙下無得而考則桓公子糾之孰為應立皆不可知故其是非不可懸㫁但公羊榖梁去古未逺皆謂子糾應立所以不直桓公至謂之篡又謂經書齊人取子糾殺之是自殺其應立之子又桓公既得國而猶欲殺子紏者盖有應立之道是其所忌若當時桓公果是兄子糾果是弟桓母班序又髙則可用伊川之說子路子貢亦可以無疑今二子皆以此為問者是當時公論不直桓公皆謂子糾應立桓公不當殺兄然夫子皆不荅所問乃直取管仲之功此則正是聖人妙處不可窺測者也然夫子不責管仲以死者盖公子無為君之道師傅先君所設不可純以臣禮律之有患難則相與周旋既巳宣力效勞竭盡其節而偶脫虎口者則亦在所可恕如管仲是也若桓公子紏事須案春秋經文為正不案經文則不見聖人之妙桓公之功最著扵存三亡國而其最謬莫甚扵釋慶父里克而不誅魯莊公盖亦崛彊偃蹇桓公雖霸終不往朝之却因納幣觀社逆女方往齊固皆是非禮然亦足以見莊公於齊亦頗偃蹇其扵齊皆以他故往自夫人至後亦不復往齊止㑹遇而已盖終不曽特往朝之齊却親魯此桓公所以為賢公及齊侯遇扵榖蕭叔朝公蕭叔盖朝齊因公在榖故就朝盖前此未嘗相見故行朝禮禮有従權杜氏謂嘉禮不野合非也又以叔為名澤以為字又齊與魯遇蕭叔在焉自不得不見又遇禮簡易諸侯體敵可用遇禮蕭是附庸雖邂逅於理應朝齊仲孫來傳曰齊仲孫湫來省難澤謂諸臣以私事來惟王人書故書祭伯來是也今仲孫之來實齊侯之命其名為省難其實為覘國而上闕所以疑之也齊有因亂取魯之志仲孫之來魯之存亡得失所繫而止以四字錄之所以使人深求其故也存國體故不書省難非以嘉好聘故不書使不書使故不復稱名不稱名則若以私事自來盖亦陽若不知其故者所謂不逆詐不億不信而常先覺也然仲孫之志亦欲存魯實亦賢者不書名亦所以嘉之桓公終亦存魯能改過遷善有存亡繼絶之徳故終録其使變其文善其辭簡其字而意義深矣齊侯之使仲孫善惡未判仲孫歸而魯之存亡始決故書法如此善處大變故者惟聖人獨能之衛侯燬滅邢先儒皆謂譏滅同姓澤更推尋以為凡蔣邢茅胙祭周公之𦙍當來成王以周公有大勲勞扵天下既已封伯禽於魯又封其支子六人所以荅周公之勲勞及至春秋時往往為人吞併今邢又為衛所滅矣邢與魯同出自周公則邢之存亡於魯甚相關衛既忍於滅周公之後而魯不能為之請扵天子請扵大國請扵衛以復存其社稷以篤親親之恩聖人深有感於世變故書曰衛侯燬滅邢雖罪衛侯而亦繋扵魯也天王狩于河陽於史當曰晉侯召王今史記書晉侯召王于温此所謂直筆也然則厲聲色以罵人人未必服何則忿戾諱過者恒多則嚴督責之說有時而窮矣聖人順天理之正眀君臣之義為之改書曰天王狩于河陽豈非遏惡揚善成人之美哉雖使晉文公復生親見夫子書法亦将帖焉心服可以坐消其彊猛之氣而遷善逺罪之不暇矣此其比於直筆豈不百倍其功哉楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父扵陳公羊榖梁似此等處多云實與而文不與固是說得好聴却全不曽尋得書法之妙盖此時本已縣陳以申叔時之諫而止聖人許人遷善故沒其縣陳本意而止以入陳為文又本是先入陳而後殺徴舒討弑君賊今却先書殺夏徴舒而後書入陳便是聖人先正其討賊之義觀聖人扵此實有所激縁齊桓晉文俱有匡正天下扶持周室之功然皆包容弑君賊置而不問所以飬天下之亂是以於楚子入陳一事特顯此義既已取其討亂之功而後書楚子入陳納公孫寧儀行父于陳者以見楚之用師不過討賊納此二卿以定陳亂而已便與稱兵肆虐不同此皆聖人取人為善止遏亂略之意所以為書法之妙也王正月辯春王正月此不過周之時周之正月而據文定則春字是夫子特筆故曰以夏時冠周月又謂夫子有聖徳無其位而改正朔如此則正月亦是夫子所改蔡九峰則謂周未嘗改月引史記冬十月為證如此則時或是夫子所移易以此說夫子豈不誤哉澤之愚見只是依據三傳及漢儒之說定以夫子春秋是奉王者正朔以建子為正此是尊王第一義決無改易其荅顔子行夏之時乃是為萬世通行之法非遂以之作春秋也凡王者正朔所以統壹諸侯用之紀年用之朝㑹若民事自依夏時後來漢武帝魏文帝始定用夏時是行夫子之言也合只就經文舉所書月以證改時改月如後莊公二十有三年夏公如齊觀社此周之四月也當夏正建卯之月則改時改月甚眀僖公三年自去冬十月不雨至春書王正月不雨夏四月不雨至六月雨若用夏正則六月乃建未之月歴三時不雨六月乃雨如此則春不得耕夏不得種種不入土為災大矣今此六月是周正建巳之月得雨可以耕種則於農事無妨故此年不書旱不書饑眀是周正哀公十四年春西狩獲麟冬獵曰狩此是子丑之月故書狩也觀此足以知周家實是改時改月而主夏正者則謂非時而狩所以為譏澤以為既不書公狩又不書狩之地此只是虞人脩常職本不應書所以書者盖特為獲麟故不可彊以為貶右所舉改時只此數處亦自分眀其餘亦不足深辯盖此是一二百年間私著曲說以蠧害聖經自两漢至唐並無此說也漢初猶有夏殷周及魯歴又有顓頊歴古人見前代歴紀甚眀又三傳所載之事互有異同然同是遵用周正别無異說凡三代正朔皆是自為一代之制以新民之耳目既改月則須改時應紀年㑹同朝聘作史者一皆遵用故夫子春秋是時王正朔安可有他說也大抵商周本是錯改時錯改月但學者皆不肯為商周認錯若肯為商周認錯則經㫖自然眀白矣若周之改月只以孟子嵗十一月徒杠成十二月輿梁成及七八月之間旱為證晦菴集註所據周改時止以行夏之時為據盖周以建子之月為春終是不正故夫子思行夏之時也此只以聖經之言為證不煩他說魯隠公元年不書即位義此隠公之元年何以不書即位攝故也君薨而世子立世子糿則國政聴扵大臣堪事而復辟焉古有之矣曰隠公為大臣乎曰非也庶長而有先君之命使之攝而奉桓者也何以知其有先君之命乎曰桓公之母仲子也以貴聘之則其子貴矣故桓公之生先君既以為世子諸侯國人知之矣則隠公之攝非先君之命而誰乎曰庶長何以不得立曰是聖王之制所以正嗣統而杜禍亂之原定民志也禮諸侯一娶九女無再娶之文適夫人無子則擇諸右媵右媵無子則擇諸左媵左媵無子而後取諸衆妾之子亦皆以其序焉有常制矣隠母媵也故其子不得承統然則桓母適乎曰不適曰不適則曷為而貴曰非適非媵桓母也非適非媵是謂再娶盖先君之失禮而臣子末如之何者也恵公之適妃孟子也孟子卒繼室以聲子隠母也其後仲子之歸魯盖純以夫人禮聘之國人皆曰此夫人也隠亦嘗母事之矣隠立而天子又嘗歸賵焉則恵之貴桓母有素矣雖然豈禮之正哉是故眀天子在上則婚娶得禮而適庶之分眀及王制不行而後諸侯越禮者衆越禮矣而直以古義㫁之則扵事情之實将不勝其扞格而終非臣子所得追議於君父也然則隠烏得而不奉桓乎榖梁子曰讓桓不正若隠者可謂輕千乘之國蹈道則未由榖梁之說㫁則㫁矣而不達乎事之情昩乎禮之權者也使隠公黜桓而自立則是負先君之託先君之肉未寒而舉其所愛推而逺之設令其禍不至扵殺而桓之母子失所矣而曰我為正其得謂之正乎其得謂之孝乎而人之情又肯盡従之否也使人情而果従是亦亂耳是亦篡耳況人情未必然而先君之命實不可改乎故隠之奉桓足以為賢而說春秋者苟能覈事情酌時宜以處中而毋執一焉庶㡬乎得之矣諸侯娶女立子通考何氏曰諸侯一娶九女無再娶之文適夫人無子則立右媵之子右媵無子則立左媵左媵無子則立夫人娣姪夫人娣姪無子則立右媵娣姪右媵娣姪無子則立左媵娣姪成公九年二月伯姬歸于宋經書衛人來媵又書晉人來媵又書齊人來媵案左傳凡諸侯嫁女同姓媵之異姓則否今魯嫁伯姬三國來媵共十二女而齊是異姓豈宋先代之後上公爵尊故如此歟然不可考矣又案傳隠公三年云衛荘公娶于齊東宮得臣之妺曰荘姜美而無子又娶于陳曰厲媯生孝伯蚤死其娣戴媯生桓公荘姜以為己子據厲媯即何氏所謂右媵其娣戴媯即右媵之娣又據昭公八年陳哀元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝此所謂三妃即夫人與左右媵合此數處觀之則諸侯九女之制甚眀其立子則各従其母之貴賤也齊桓公之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟少衛姬生恵公鄭姬生孝公密姬生懿公葛嬴生昭公宋華子生公子雍案桓公夫人三當是徐嬴蔡姬娶在先王姬娶在後所以如此不是兩媵故皆稱夫人内寵六人寵皆相軋又非娣姪所以子皆爭立妻妾踰制非正家之道也晉襄公卒晉人以難故欲立長君賈季欲立公子樂趙宣子欲立公子雍宣子曰辰嬴賤樂之母班在九人其子何振之有杜祁雍之母以君故讓偪姞而上之以狄故讓季隗而已次之故班在四愚案此事宣子如此擬議後雖不曽成然當時偶無適子而欲立妾子者其選擇之法大抵如此右春秋諸侯娶女立子大略如此惟公子糾却不知其母之貴賤小白母衛姬是齊僖公妾然亦不知其班序之尊卑但據二傳說子糾母貴宜為君史記謂子糾母魯女則班序不當在衛姬下此外别無考證不可懸㫁也春秋指要易與春秋皆夫子作然二經事體又自不同易則文王周公已有全書春秋却是古所未有二帝傳授精一執中心法百聖所同唯春秋一經乃是夫子所獨盖夫子之精微縕奥皆具扵易而所以立教則在詩書禮樂其撥亂反正制事之權皆在春秋二帝三王皆有事功夫子之事功則在春秋也故曰吾志在春秋豈不信乎刪詩書正禮樂繋易是述唯春秋可以言作易稱巽以行權盖巽順而後其權可合扵正若先不巽順則其所謂權者乃亂耳如孔子作春秋固是行權然聖人之心本極扵巽順以巽順行權所以濟世道之不通若因循頋忌視天下之沈溺與已不相關則亦非聖人之心矣惟其巽順故天下莫敢議其非然聖人猶曰罪我者春秋可謂巽順之至矣春秋之初如衛州吁之事此時事體當責王室及春秋中世當責伯主及其後肆無忌憚然後用孔子之法如胡氏說公及宋公遇于清宋公陳侯蔡人衛人伐鄭說得似急廹恐非本意及衰亂之極王者既不興諸侯又無伯聖人既生此時不應坐視其弊夫人無逺慮必有近憂他人且不可况聖人乎此春秋所以不得不作隠公八年夏六月己亥蔡侯考父卒秋七月庚午宋公齊侯衛侯盟扵瓦屋胡文定皆以為仲尼變周制澤以為仲尼救周之衰則有之以為變周制則不可以徳則孔子是聖人以分則孔子是陪臣豈得變周之制春秋自三傳已多異同又益以三家之註實有矛盾至啖趙陸氏又往往自為說及近代孫泰山胡文定所見又往往不同晦菴所以不解春秋者為此故也或問朱子何以不解春秋荅以元年春王正月某已不曉據此則是已不滿扵胡傳但不肯翻然立異耳凡解春秋不與先儒立異則經旨不眀若與先儒立異則扵事體又甚不便正說未見信謗議已隨之所以晦菴荅門人問胡傳曰不若且聴他如此說得三綱五常不至廢墜足矣此不得已之說其實不滿扵胡傳也春秋所以難說盖不止扵元年春王正月如不書即位公羊穀梁所見自殊胡文㝎是穀梁而非公羊其說雖正然扵事情不察未免有差夫以王制論之則恵公元妃孟子既無子則隠是庶長當立胡氏以隠是譲而非攝其說是矣但禮失之餘先君之事亦已如此既不容探其本而歸之正而徒裁正其末流豈不齟齬扞格而大咈扵人情哉仲子之歸魯盖以夫人禮聘之亦已假寵於王室故王室知有仲子其後歸其賵也若據此事情則仲子既貴桓是太子隠自不得立其所以攝者父命也如此則公羊之說為是又據左傳則元妃既薨聲子已攝内政久之仲子歸魯既稱夫人聲子亦已退避仲子之貴有素矣隠公二年十二月乙夘夫人子氏薨三年四月辛夘君氏卒仲子稱薨聲子稱卒書法如此聖人斟酌輕重之意亦可見焉或曰正義不従而固従此偏曲之說何也曰此變禮也非偏曲也若欲伸正義必眀天子而後可不然則用榖梁之說以輔佐隠公使之自立則上逆天子君父之命又必殺桓公母子而後可焉此說春秋者所以不得已則従權也或曰何以謂之上逆天子曰恵公在位久晩年以魯夫人之祥娶仲子若不請扵天子以夫人禮聘則宋人必不與故經書夫人子氏薨是嘗請命扵天子可以稱夫人矣雖是失禮然亦有故又與汎常違禮者不同故說春秋者又當斟酌事情未可直情而徑行也唐人考古之功如孔頴達賈公彦最精密陸徳眀亦然但音切未善宋氏諸儒經學極深但考古之功却踈若以宋儒之精用漢魏晉諸儒考古之功則全羙矣去古既逺不先傚漢魏諸儒之勤却便欲說義理祗愈踈耳大抵生扵後世既不獲親見聖賢又不獲在兩漢魏晉間則去古日逺考古之功自然不及如名物度數漢儒猶有目擊者今却皆是索之紙上豈不踈乎夏時周月之說魏晉諸儒焉得有此論乎自唐以來說春秋者多不滿扵三傳然說者之扵春秋其詳密未必能及左氏杜預也使說春秋者先有丘眀元凱詳密之功而後加以河洛大儒之論則事情既得書法不差義理自然順序可以歸一今諸說皆捨先儒已成之功稽古之實所見又未完備而遽與之立異焉春秋之道所以久而不眀者以此故也周易春秋有繩墨之書不可不學而實未易學也易當眀象春秋當眀書法象學久已失傳故易尤難焉然自輔嗣以來玩其辭解其義所失亦未逺唯春秋當據事以求書法說者往往不察事情而輙以已意窺聖人由是衆說迭興而夫子之志荒矣澤自蚤嵗已深有所疑乃潜心以求積數十年而後黙有所悟大徳八年始作註具藁積十有七年改削猶未成書其辯難剖决之文悉入六經辯釋補註其春秋筆削本㫖以貧故未得脩述是以有其義而無其辭今年已六十餘大懼失墜所以不得忘言者用工已有次第中道而廢則深可惜且古今說春秋最苦於所說不完雜糅紛紜徒亂人意是以王介甫㡬欲舉而廢之澤嘗有言凡說春秋要意思渾全若一處欠闕便成疏漏一切舛謬從之而起故說春秋者若所見未完則如勿說非徒無益而又害之若所見果完則雖㣲賤無聞于時神明必有相之者此澤所以不得不盡智畢議求以無負于聖人也然正解既未脱藁本㫖又未著筆補註雖巳刋澤亦頗靳惜其書盖四十餘年之勤覧者一目可盡而此心終未暴白于世懼人之褻而視之也故具指要數十處使觀者察焉夫說之詳辯之明則易為觀聴而人往往遂怠于學又補註者積久之功如器之已成人但見其易而不知其難也故推本其始與有志經學者共之儻不棄鄙言先黙㑹于此而後推以及其餘則全經可通意無不渾而諸儒之得失無所遁其情矣指要隠公元年春王正月夏五月鄭伯克段于鄢秋七月天王使宰咺來歸恵公仲子之賵二年春公㑹戎于潜紀子帛莒子盟於宻十有二月乙夘夫人子氏薨三年夏四月辛卯君氏卒四年九月衛人殺州吁于濮冬十二月衛人立晉五年九月考仲子之宫初獻六羽八年夏六月己亥蔡侯考父卒八月𦵏蔡宣公十一年春滕侯薛侯來朝桓公元年鄭伯以璧假許田二年春王正月戊申宋督弑其君與夷及其大夫孔父滕子來朝四年夏天王使宰渠伯糾來聘七年夏榖伯綏來朝鄧侯吾離來朝十年春王正月十一年突歸扵鄭鄭忽出奔衞十五年二月天王使家父來求車五月鄭伯突出奔蔡鄭世子忽復歸于鄭十七年癸巳𦵏蔡桓侯荘公元年夏單伯逆王姬秋築王姬之館于外王使榮叔來錫桓公命王姬歸于齊八年甲午治兵夏師及齊師圍郕郕降于齊師九年夏公伐齊納子糾齊小白入于齊九月齊人取子糾殺之十五年秋宋人齊人邾人伐郳二十一年秋七月戊戌夫人姜氏薨二十二年春王正月癸丑𦵏我小君文姜冬公如齊納幣閔公元年冬齊仲孫來僖公元年春王正月齊師宋師曹伯次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢十二月丁巳夫人氏之喪至自齊二年夏五月辛巳𦵏我小君哀姜虞師晉師滅下陽四年楚屈完來盟于師盟于召陵五年公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟冬晉人執虞公八年秋七月禘于太廟用致夫人十七年夏滅項秋夫人姜氏㑹齊侯于卞十九年夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾己酉邾人執鄫子用之二十一年十二月癸丑公㑹諸侯盟于薄釋宋公二十五年春王正月丙午衞侯燬滅邢二十八年楚殺其大夫得臣公朝于王所天王狩于河陽壬申公朝于王所二十九年夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉三十年冬天王使宰周公來聘公子遂如亰師遂如晉文公元年天王使毛伯來錫公命叔孫得臣如亰師二年丁丑作僖公主四年冬十一月壬寅夫人風氏薨五年春王正月王使榮叔歸含且賵三月辛亥𦵏我小君成風王使召伯來㑹𦵏六年閏月不告月猶朝于廟七年秋八月公㑹諸侯晉大夫盟于扈八年公孫敖如京師不至而復丙戌奔莒宋人殺其大夫司馬宋司城來奔十六年夏五月公四不視朔十七年諸侯㑹于扈宣公元年公子遂如齊逆女三月遂以夫人婦姜至自齊八年夏六月公子遂如齊至黄乃復辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥戊子夫人嬴氏薨冬十月己丑𦵏我小君敬嬴雨不克𦵏庚寅日中而克𦵏九年陳殺其大夫洩冶十一年冬十月楚人殺陳夏徵舒十二年冬十二月戊寅楚子滅蕭十三年夏楚子伐宋十五年六月癸夘晉師滅赤狄潞氏以潞子嬰兒歸十八年歸父還自晉至笙遂奔齊成公元年三月作丘甲二年十一月公㑹楚公子嬰齊于蜀六年二月辛巳立武宫七年不郊猶三望八年夏宋公使公孫夀來納幣衞人來媵九年晉人來媵十三年三月公如亰師夏五月公自亰師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦十六年楚殺其大夫公子側十八年春王正月晉殺其大夫胥童庚申晉弑其君州蒲襄公四年秋七月戊子夫人姒氏薨八月辛亥𦵏我小君㝎姒五年叔孫豹鄫世子巫如晉公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚六年莒人滅鄫七年鄭伯髠頑如㑹未見諸侯丙戌卒于鄵十年夏五月甲午遂滅偪陽十四年夏四月叔孫豹㑹晉荀偃齊人宋人衞北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦十六年叔老㑹鄭伯晉荀偃衞寗殖宋人伐許十九年晉士匄帥師侵齊至穀聞齊侯卒乃還二十一年邾庶其以漆閭丘來奔二十五年公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀秋八月己巳諸侯同盟于重丘二十六年春王二月辛夘衛寗喜弑其君剽衞孫林父入于戚以叛公㑹晉人鄭良霄宋人曹人于澶淵二十七年秋七月辛巳豹及諸侯之大夫盟于宋二十九年吳子使札來聘昭公元年冬十一月己酉楚子麇卒楚公子比出奔晉八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒冬十月壬午楚師滅陳𦵏陳哀公十三年夏四月楚公子比自晉歸于楚弑其君䖍于乾谿楚公子棄疾殺公子比蔡侯廬歸于蔡陳侯吳歸于陳十四年春意如至自晉十五年二月癸酉有事于武宫籥入叔弓卒去樂卒事十九年冬𦵏許悼公二十年秋盗殺衞侯之兄縶二十四年婼至自晉二十七年春公如齊公至自齊居于鄆二十九年春公至自乾侯居于鄆三十年春王正月公在乾侯三十二年春王正月公在乾侯取闞㝎公元年夏六月癸亥公之喪至自乾侯戊辰公即位秋七月癸巳𦵏我君昭公四年劉卷卒𦵏劉文公八年従祀先公盗竊寳玉大弓九年得寳玉大弓十二年叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費十二月公圍成十三年夏築蛇淵囿大蒐于比蒲十五年秋七月壬申姒氏卒九月丁巳𦵏我君㝎公雨不克𦵏戊午日下昃乃克𦵏辛巳𦵏㝎姒哀公三年五月辛夘桓宫僖宫災十二年春用田賦十四年春西狩獲麟右所舉經文只是提其要雖若不完然一事必與數十事相關則全經固已在其中矣如不書即位當與後靣書即位参看書㑹盟當與凡㑹盟合而求之所以謂之指要然其間亦有迭出者則自有意又晉韓宣子聘魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王春秋傳序云其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼従而脩之以成一經之通體此兩處亦要切澤嘗謂後人說春秋未必能及丘眀元凱者正指此等處然此却非諸儒之罪乃是古今之殊去古近者所見未差去古逺者則益疎矣故學春秋者先得如丘眀元凱然後可求向上之功觀者毋忽此言也資中黄澤書春秋師說卷下
