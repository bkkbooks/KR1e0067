body:
  text: 思古吟十章併序澤於易春秋二書自束髮即有志然求之三十餘年甫得緒端葢思慮之至通乎鬼神心誠求之而不狃於曲說小見是以天亦憫其勞啟其愚而卒相其成也暇日援筆作思古吟十章敘其始者之艱難中焉有得於髣髴而未備最後則若親見聖人提耳而面命之或有能譜琴者采其辭意為之聲調援而鼓之亦足以少慰其平生其一章曰有一人兮温温其恭學不厭兮敎思無窮去之將二千載兮莫繼其蹤思而不可見兮吾將曷從二章曰有一人兮閒居而優游詩書禮樂兮十翼春秋肩類子產兮其顙如堯淑我後人兮使我瘳思而不可見兮中心揺揺三章曰有一人兮後千載而長存天地其道兮河漢其文我有冠裳兮孰知我原思而不可見兮中心悁悁四章曰有一人兮代天而行義尊王黜亂兮復古其志變史為經兮百世昭示去之久逺兮孰測微意思而不可見兮使我忘寐五章曰有一人兮太極合德君子之謙謙兮曰五十而學易羲文姬旦兮先後揆一端倪曉示兮舒泄幽宻去之久逺兮神祕其跡思而不可見兮使我忘食六章曰有一人兮尼首而河目象環之佩兮温其如玉文章煥爛兮斯道長續存榮没哀兮大成者獨我思入神兮如見其復瞻前忽後兮惟日不足七章曰有一人兮天髙而日光䝉倛其面兮禹湯之長我思入神兮夢至其傍膝行而有請兮冀一渉乎津梁憫微𠂻之拳拳兮忽若洗髓而滌腸酌我以井冽之泉兮被我以坤文之裳去我扄鐍兮謂我其臧亦戒以世俗之夸談兮曰吾非素王汝克復予之常兮予無汝忘八章曰有一人兮衣逢掖而冠章甫上律天時兮下襲水土纍纍其容兮背若微僂祖述堯舜兮憲章文武我思入神兮恍爾而遇俯伏下風兮將泣而訴憫中誠之拳勤兮忽獨與處授我以三絶之編兮與我心語介我於文王周公兮遺我以二百四十二年之魯忽然而醒兮有涕如雨九章曰有一人兮翼翼小心順其天兮演易示人屈伸消長兮黙識其故吉凶悔吝兮曷為而無因崇陽兮抑陰福善兮禍滛因孔氏以膝行乎王之前兮測其原而益深豁然悟兮日月昭臨噫人有尊卑兮道無古今噫人有尊卑兮道無古今十章曰有一人兮赤舄几几制作孔備兮之才之美文王我師兮親為父子申以爻辭兮如掌之示去之久逺兮𤣥理䝉蔽胡然而險阻兮胡然而簡易因孔氏以膝行乎公之前兮發其機於久祕恍然而悟兮神授天啟洩洩融融兮恢我樂地嗚呼蘋藻之微兮足以薦貴嗚呼蘋藻之微兮足以薦貴六經辨釋補注序先聖王之敎士也以詩書禮樂為四術易者占筮之繇辭春秋者侯國之史記自夫子賛易脩春秋之後學者始以易春秋合先王敎士之四術而為六經經焚于秦而易獨存經出于漢而樂獨亡幸而未亡者若書若禮徃徃殘缺惟詩與春秋稍完而已漢儒專門傳授守其師說不為無功於經而聖人之意則未大明於世也魏晉而唐注義漸廣至宋諸儒而經學之盛極矣程子之易立言幾與先聖並然自為一書則可非可以經注論若論經注則朱氏詩集傳之外俱不能無遺憾也後儒於其旣精旣當者或未能嚌味其所可取則於其未精未當者又豈人人而能推索其所未至哉予嘗於此重有嘅焉而可與言者甚鮮也蜀儒黃澤楚望貧而力學往年初識之於筠今年再遇之於江讀易詩書春秋及周官禮記悉欲為之補注補注之書未成而各經先有辨釋宏綱要義昭揭其大而不遺其小究竟謹審灼有真見先儒舊說可從者拳拳尊信不敢輕肆臆說以相是非用功深用意厚以予所見明經之士未有能及之者也晚年見此寧不為之大快乎楚望不輕以示人而徳化令王君乃為鋟梓以傳予歎美之不足因以諗于學者蓋必於諸經沉潜反覆然後知其用功之不易用意之不苟云年月日臨川吳澂序易學濫觴春秋指要序楚望父之註經其志可謂苦矣易欲明象春秋欲明書法蓋將前無古而後無今時出其所得之大槩示人而全註未易成也每以家貧年邁弗果速成其注為嗟世亦有仁義之人能俾遂其志者乎予所不能必也道之行與命也愛莫助之永歎而已延祐第七立秋之後四日臨川吳澂書于易學濫觴春秋指要之卷端
