body:
  text: 黃楚望先生行狀先生諱澤字楚望其先長安人唐末有官於蜀者知資州内江縣曰舒藝卒葬資州次子師明留居後遂為資州人師明長子知權知丹山縣事知權長子延節宋初以徳行道藝聞拜宣徳郎通判渠州討宼有功召入面奏當世利害剴切太祖大恱除大理評事兼監察御史以子徳潤徳全官稍顯累贈金紫光祿大夫季曰徳柔先生十世祖也五世祖拂與二兄播揆同年登進士第蜀人榮之為賦詩稱美其事考某字儀可以孝友聞累舉不第隨兄驥子官九江蜀亂不復能歸因留家九江而貧日甚矣先生生有異質日誦數千言年十二三即盡通當代進士經義論策之學内附國朝年十六矣慨然以明經學古篤志力行自勵好為苦思屢以成疾疾止則復苦思如故嘗見邵子論天地自相依附即以此思之因及河圗洛書渾天蓋天吾道異端不同之故以為格物致知之端孰有大於此者晝夜思之弗得弗措也年二十餘始旁通古今史志别集詩文皆不習而能詩尤超邁清美久之於周程張朱之書有得作顔淵仰髙鑚堅論以自勉是時行省鉅公猶有尊賢敬學者屢以書院山長之祿起先生敎授江之景星洪之東湖考滿即歸閉門授徒以為養悉取六經百氏傳註疑義千餘條離析辯難以致其思不復言仕矣始先生嘗夢見夫子以為適然旣而屢夢見之最後乃夢夫子親授所校六經字畫如新其家無一畝之殖而决意歸休以六經絶學為己任蓋深有所感發也時大德甲辰先生年四十五矣自是以來十餘年閒屢悟聖經隱賾之義凡數十處而失傳之旨以漸可通乃作思古吟十章極言聖人徳容之盛上達於文王周公以致其寤寐不忘之意時郡守寓公猶有能敬重先生者待先生以學校賓師之禮月致米六斛鈔三十千葢國初賢守設此以奉前代寓公之無歸者方二親髙年陋巷破窓不蔽風雨先生敬共奉持菽水驩然如有三牲之養也又十餘年而二親相繼終先生年近六十矣數經嵗大祲家人采木實草根療饑行部有蔡副使者考學糧之籍謂先生一耆儒爾月廩太豐削其三之二時先生老不復能敎授而家人輩寒飢自此始矣當其絶食相視黙黙不知所出而先生瞑目端居涵泳優㳺未嘗少變或與客談論終日揖讓如平時客不知先生未飯也然終不為一日降志以謀温飽唯以聖人之心不明經學失傳若已有罪用是為大戚葢自昔所聞儒學之士貧窶空乏以終其身未有若斯甚者而先生晏然曾不少動其意非有髙明卓絶之見堅苦特立之操其孰能與於此先生卒於至正六年丙戌某月某日得年八十有七以郡人王儀甫所歸棺斂九江學者蓋少先生又深自韜晦不求聞知唯待人接物則無貴賤一致其誠故死之日逺近聞者莫不哀之娶某氏子男二聖予幼者蚤夭女二劉齊賢徐可久其壻也孫男二女一先生於經學以積思自悟為主以自然的當不可移易為則故其悟也或得諸幽閒寂寞之餘或得諸顛沛流離之頃或得諸疾病無聊之日或得諸道途風雨之中及其久也則豁然無不貫通自天地定位人物未生以前沿而下之凡邃古之初萬化之原載籍所不能具者皆昭若發䝉如示諸掌然後由伏羲神農五帝三王以及春秋之末其人倫之端禮樂之本皇道帝德神化宜民之妙井田區畫之初封建自然之勢鬼神祭祀之始神物前民之用起數立象之機聲教文治之原制作因革之漸忠質文異尚之體世變禮失之由以力假仁之習皆若身在其閒而目擊其事者於是易春秋傳註之失詩書未决之疑周禮非聖人書之謗凡歴代聚訟不决數十年苦思而未通者皆冰解凍釋怡然各就條理蓋由專精積久而後得之每自以為天開其愚神啟其祕也其於易以明象為先以因孔子之言上求文王周公之意為主而其機栝則盡在十翼作十翼舉要以為易起於數因數設卦因卦立象因象起意因意生辭故孔子曰易者象也立象以盡意居則觀其象而玩其辭聖人言易之為教如此易不可廢象明矣由象學失傳漢儒區區掇拾凡陋不足以得聖人之意而王輔嗣忘象之說興至邢和叔則遂欲忘卦棄畫雖以近代鉅儒繼作理學大明而莫能奪也作忘象辨有一卦之象有一爻之象或近取諸身或遠取諸物或以六爻相推或以陰陽消長而為象者學者猶可求也然有象外之象則非思慮意識所能及矣而况於立例以求之乎李鼎祚綴輯於王氏棄擲之餘朱子發後出而加密丁易東繼之而愈詳聖人立象之妙終不可見作象略象學旣明則因象以得意因意以得辭陰陽消長有一定之幾上下貴賤有一定之分善惡吉凶有一定之則位之當者孔子無由獨言其非卦與爻之小者文王周公固不謂之大然後知三聖人之易一而已矣若舎象而求則人自為易不期於異而自異作辯同論嘗曰易有八卦有六十四卦有三百八十四爻有大象有小象有大傳繫辭有說卦有序卦有雜卦有河圖洛書蓍策之數學者當隨處用工各詣其極至於一以貫之而後全易見矣其於春秋以事實為先以通書法為主其大要則在考覈三傳以求向上之工而其脉絡則盡在左傳作三傳義例考以為春秋有魯史書法有聖人書法而近代乃有夏時冠周月之說是史法與聖法俱失也作元年春王正月辯又以為說春秋有實義有虗辭不舎史以論事不離傳以求經不純以襃貶泥聖人酌時冝以取中此實義也貴王賤覇尊君卑臣内夏外夷皆古今通義然人自為學家自為書而春秋迄無定論故一切斷以虛辭作筆削本㫖又作諸侯取女立子通考魯隱公不書即位義殷周諸侯禘祫考周廟太廟單祭合食說丘作甲辯凡如是者十餘通以明古今禮俗不同見虛辭說經之無益嘗曰說春秋須先識聖人氣象識得聖人氣象則一切刻削煩碎之說自然退聽矣其但以為實錄而已者則春秋乃一直史可脩亦未為知聖人也其說易有常變而春秋則有經有權易雖萬變而必復於常春秋雖用權而不逺於經各以二義貫一經之㫖嘗曰易象與春秋書法廢失之由大略相似苟通其一則可觸機而悟矣蓋古者占筮之書即卦爻取物類象懸虛其義以斷吉凶皆自然之理乃上古聖神之所為也文王周公作易時取一二立辭以明敎自九簭之法亡凡簭人所掌者皆不可復見而象義隱微遂為歴世不通之學矣魯史記事之法實有周公遺制與他國不同觀韓宣子之言可見聖人因魯史脩春秋筆則筆削則削游夏不能賛一辭則必有與史法大異者然曰其文則史是經固不出於史也今魯史舊文亦不可復見故子朱子以為不知孰為聖人所筆孰為聖人所削而春秋書法亦為歴世不通之義矣先生所謂廢失之由有相似者葢如此又懼夫學者得於創聞不復致思故所著書目雖多皆引而不發乃作易學濫觴春秋指要經㫖舉略稽古管見示人以求端用力之方而易春秋全觧則終身未嘗脫藁示人也其辯釋諸經要㫖則有六經補注詆排百家異義則取杜牧之不當言而言之意作翼經罪言其論周禮以為六官所掌皆循唐虞夏商已行之事雖有因革損益或加詳宻而大體不能相逺者非周公創為之制也古今風俗事體不同學者不深考世變而輒指其一二古逺可疑者以為非聖人之書此不難辯獨其封國之制與孟子不合則所當論蓋孟子所言因殷之制周官乃周家之制也計武王之興殷諸侯尚千有餘國既無功益地亦無罪削邑此當仍其舊封百里之下為三等如孟子之說乃若周公太公有大勲勞及其餘功臣當封爵與夫並建宗親以為藩屏豈可限以百里之法哉自當用周制耳諸侯惡其害已而去其籍是書當世學者鮮得見之則周家一代之制雖孟子亦有不能詳也其於官屬多寡之由職掌交互之故錯亂之說發義尤精其祭祀之法則兼戴記而考之作二禮祭祀述略禮經復古正言其辯王肅混郊丘廢五天帝併崑崙神州為一祭之說曰祭法虞夏殷周皆以禘郊祖宗為四重祭周人禘嚳而郊稷祖文王而宗武王禘祭天地以嚳配即圜丘方澤是也郊祀上帝以后稷配建寅之月南郊祀感生帝以祈榖也四時祀五天帝於四郊以迎氣也祖帝嚳以后稷配尊始祖之所自出也宗祀文王於明堂以配上帝緫配五天帝也其後則祖文王於明堂以配五帝宗武王於明堂以配五神凡此皆鄭氏義也故周禮大司樂註以圜丘方澤宗廟為三禘蓋天神地示并始祖之所自出為三大祭皆五年之禘也郊次圜丘社次方澤宗次祖皆常嵗所舉之祭也東遷土蹙財匱大禮遂廢所脩唯郊社二祭故圜丘方澤二禘傳記亦罕言之非淺聞所及矣周禮有祀天旅上帝祀地旅四望之文天地主于一故稱祀上帝四望非一神故稱旅肅欲以圜丘為郊可乎司服王祀昊天上帝服大裘而冕祀五帝亦如之旣曰亦如之則五帝之祀與昊天上帝非一祭矣肅欲混之可乎孝經稱嚴父配天又稱郊祀后稷以配天宗祀文王於明堂以配上帝易豫卦曰先王以作樂崇德殷薦之上帝以配祖考上帝亦天神也肅欲廢五天帝而以五人帝當之可乎崑崙者地之頂神州者地之中皆天地之所交也地示主崑崙神州非是設此二祭乃求神於二處大地神靈莫測不知神之在彼乎在此乎故求之於彼亦求之於此也康成以方澤主崑崙北郊主神州北郊不見于經誤分為二王氏由此并崑崙神州為一祭而遂謂北郊為方澤可乎若鄭氏知樂九變之祭為禘而不言及嚳又以為禘小於祫此則其失也故斷之曰鄭氏深而未完王肅明而實淺晉武帝肅外孫也故用其說并方圜二丘而祀南郊歴代無所因襲而周禮天神地示人鬼極盛之祭遂為古今不决之疑矣其辯感生帝之說曰姜嫄履帝武敏歆而生后稷周人特為立廟而祭謂之閟宫君子以為聖人之生異於常人無異義也况乎生民之初氣化之始五天之精感而為帝王之祖亦何疑乎五帝感生之祀上世流傳旣久非緯書創為之說也且河圖洛書蓍䇿之數皆緯文也其可盡廢乎其辯胡仁仲以社為祭地曰二社以享水土榖之神而配以勾龍稷非祭地也禮天子諸侯羣姓百姓大夫及庶民皆立社故有王社侯社大社國社置社之名其名義髙下不同如此而謂之大示之祭可乎殷革夏周革殷皆屋其社是辱之也旱乾水溢則變置社稷是責之也王者父事天母事地而可責可辱乎周禮王祭社稷五祀則希冕以社稷下同五祀而用第五等之服不得與先王先公四望山川比則社非祭地明矣傳曰戴皇天履后土是后土即地也周禮大祝大封先告后土大師旅大㑹同宜于社又建國先告后土則后土非社矣舜典類于上帝禋于六宗望于山川六宗者上下四方之神即五天帝及地也故其祀在上帝之次山川之前周禮四望與五帝同兆于郊又與祀地同玉又與山川同祭服則四望者祀地之四方也又有分樂所祭五土之示祭地之禮不止於方澤矣而欲以社當之可乎周禮以圜丘對方澤以天神對地示以蒼璧禮天對黃琮禮地以祀天旅上帝對祀地旅四望書及禮記乃多以郊對社蓋郊祀上帝社祭水土之神其禮專圜丘方澤徧祭天神地示其意廣逺分為四祀明矣天地之道髙深𤣥遠大神大示不可煩凟故嵗事祈之於郊而水土之變則責之於社此古人立祀深意也胡氏家學不信周禮故率意立說如此大抵先生之意以為聖人制禮遠近親踈髙下貴賤皆有自然之序必通其本原而後禮意可得蓋圜丘所祭者全體圓轉之天緫南北極黃赤道日月星辰所麗者而言故主北辰而曰天神皆降是緫祀天神也上帝者髙髙在上之天以其在上而為主宰故曰上帝分主五方故曰五帝合上下四方而言則曰六宗皆天神之分祀者也方澤所祭者全體承天之地緫山陵川澤極天所覆者而言故主崑崙而曰地􅅘皆出是緫祀地􅅘也地有四方望其方而祀曰四望五嶽四瀆之祀曰山川川澤山林丘陵墳衍原隰之祀曰五土水土之祀曰社皆地􅅘之分祀者也所謂自然之序蓋如此其辯趙伯循王者禘其始祖所自出之帝於始祖之廟以始祖配之而不及羣廟之主曰大傳王者禘其始祖之所自出以其祖配之諸侯及其太祖大夫士有善省於其君干祫及其髙祖此以禘與祫對言則禘祫皆合祭通上下文見之也蓋諸侯之祫猶天子之禘諸侯及其大祖大夫士及其髙祖是有廟無廟之主皆在而又上及其太祖髙祖故謂之祫天子則於七廟及祧廟之上更及所自出之帝故謂之禘也若曰禘其祖之所自出而反不及有廟無廟之主寂寥簡短非人情矣故程子曰天子曰禘諸侯曰祫其禮皆合祭也爾雅禘大祭也非大合昭穆何以謂之大祭乎字書訓釋曰禘者諦也審諦昭穆也若非合祭何以有昭穆乎蓋后稷有廟郊旣配帝嚳雖配天而無廟不可闕人鬼之享故五年一禘則后稷率有廟無廟之主以共享於嚳所以使子孫皆得見其祖又以世次久逺見始祖之功徳為尤盛也况后稷之廟毁廟數十世之主皆藏焉豈可當享嚳之時而屏置之乎蓋禘祫所以相亂者由天子諸侯之制不明先儒或推天子之禮以說諸侯或推諸侯之禮以說天子不知諸侯之禮有祫無禘天子之禘禮必兼祫雖其意不主合食而率子孫以共尊一帝自然當合食矣禮曰天子犆礿祫禘祫嘗祫烝則是天子祫祭隨時皆用也其辯成王賜魯天子禮樂曰周公相成王制禮作樂為天子諸侯不易之大法身沒而王與伯禽躬為非禮以享周公成王賢王魯公賢君必不至是以魯頌白牡騂剛推之則記禮者之過也禘者殷諸侯之盛祭周公定為不王不禘之法故以禴代之成王以周公有大勲勞於王室故命魯以殷諸侯之盛禮祀周公以示不臣周公之意故牲用白牡白牡者殷牲也騂剛者魯公之牲也又可見魯公以下皆合食於大廟而禮秩初未嘗敢同於周公又以春秋推之則亦非常嵗之祀成王斟酌禮意蓋如此而非有祭文王為所自出之禮如或者之云也其禘于羣公之廟則後世始僣之然晉亦有禘葢文公有勲勞于王室欲效魯禘祭而請于天子故得用之也若夫東周諸侯為所自出之王立廟稱周廟如魯與鄭是也然止謂之周廟不敢以祖廟稱之諸侯不敢祖天子也然則子孫亦不敢與享於廟單祭所自出而已祭用生者之祿則亦用諸侯之禮而已若魯旣得禘於周公之廟則周廟亦應用禘禘必有配則固冝於文王廟以周公配也若據趙氏則魯本無文王廟止於周公廟祭文王臨期立文王主與尸而祭之此於禮意實不相似若以為有文王廟則是於文王廟迎尸以入周公廟以父就子以尊就卑必不然也魯之郊大雩則平王之世惠公請之是矣然郊祀蒼帝而三望雖僣而猶未敢盡同於王室也蓋以魯有天子禮樂為成王賜者本明堂位祭統以為惠公所請者出呂氏春秋魯鄭周廟晉有禘祀見左傳先生以經證經而折衷百氏之說多如此其辯說詩之失以為古者重聲敎故采詩以觀所被之淺深然今三百篇有出於大師所采者周南召南是也有錄於史官而非大師所采者豳風及周大夫所作是也其餘諸國風多是東遷以後之作率皆諸國史官所自記錄方周之盛美刺不興漢廣江沱諸詩雖足見諸侯之美而風化之原實繫於周其後天子不能統一諸侯諸侯善惡皆無與於周故不以美刺皆謂之變風以其不繫於二南而各自為風也周禮王廵守則大史大師同車又其官屬所掌皆有世奠繫之說方采詩之時大師掌其事而大史録其時世及廵守禮廢大師不復采詩而後諸國之詩皆其國史所自記錄以考見風俗盛衰政治得失若左傳於髙克之事則曰鄭人為之賦清人莊姜之事則曰衛人為之賦碩人必有所據矣故大序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以諷其上逹於事變而懷其舊俗是說詩者不可不辯采詩之時世也黍離降為國風此時王澤猶未竭也故人民忠愛其君猶能若此其後聽者旣玩而言者亦厭遂與之相忘則雖國風亦不可復見至此則書契以來文治之迹始剗絶矣以時考之國風止於澤陂在頃王之世當魯文公之時故曰王者之迹熄而詩亡故說詩者尚論其世也先生經學自得之說為多以其書不大傳故掇其關於體要者著之當是時唯臨川呉文正公辯學正誼盡通諸經最為知先生者嘗拜集賢之命至揚而還飬疾九江濓谿書院見先生所著易學濫觴春秋指要心大善之題其卷端曰楚望父之著經也其志可謂苦矣易欲明象春秋欲明書法蓋將前無古而後無今又得六經辨釋補註觀之謂學者曰今人無能知黄楚望者孟子曰能言距楊墨者聖人之徒也楚望其人乎亦為序以歸之其略曰楚望貧而力學讀易春秋周官禮記為之辯釋補註𢎞綱要義昭掲其大而不遺其小究竟謹審灼有真見先儒舊說可信者拳拳尊信不敢輕肆臆說以相是非用工深用意厚以予所見明經之士未有能及之者也晩年見此寜不為之大快乎予歎美之不足因以諗于學者葢必於諸經沈潜反覆然後有以見其用工之不易用意之不苟云然先生雅自慎重其學未嘗輕與人言以為其人學不足以明聖人之心志不以六經明晦為己任則雖與之言終日無益也學士李公漑之使還過九江請先生於濓谿書院㑹寓公縉紳之士躬定師弟子禮假舘廬山受一經之學又將經紀先生家為子孫計先生謝曰以君之才輟朞嵗之功何經不可明然亦不過筆授其義而已若予則於艱苦之餘乃能有見吾非邵子不敢以二十年林下期君也李學士為之歎息而去或謂先生幸經道已明於已而又閟於人如此豈無不傳之懼乎先生曰聖經興廢上關天運子以為區區人力所致乎德化縣令王君子翼請刋補註藏先生家先生猶慎重之非其人不傳也荐經宼亂故宅為墟遺書之存者鮮矣悲夫先生寧使其學不傳於後終不肯自枉以授諸人是故能以數十年之勤盡究諸經於闕塞之餘而不能使聖人之心大明於天下後世蓋其道若是也豈非天乎昔者吾夫子賛易删詩定書正禮樂脩春秋將以為百王大典遭秦焚書滅學帝王經世之法遂斬然湣絶於斯時葢自開闢以來宇宙橫分一大變也鄭康成當專門固陋之世以一家之學纂釋羣經具著成說孔穎逹考覈百家大明鄭義雖於聖人之道無聞而博古窮經斯以勤矣自是四百餘年習為定論至宋清江劉原父始以聦明博洽之資據經考禮欲盡排周秦以來傳註之失宋代經學之盛劉公實張之而說者日新矣及子朱子出而羣言有所折𠂻遂定于一猶吾夫子之志也然朱子於易簡其辭微其義將使學者皆得自致於經晩嵗猶拳拳禮學而弗克論著其成書貴闕疑而又深疑古今文之異體春秋獨得書法廢失之由折𠂻諸傳各極其當矣而門人學者於二經師說不能有所發明故君子論古今經註以為自朱子詩集傳之外俱不無遺憾也先生乃欲以近代理明義精之學用漢儒博物考古之功加以精思沒身而止此蓋呉公所謂前無古而後無今者也嗚呼其遂不傳也與汸始拜先生于其門請問治經之要先生念其逺來不以為不可敎告之曰在致思而已然不盡悟傳註之失則亦不知所以為思也請問致思之道先生曰當以一事為例禮女有五不娶其一為䘮父長子註曰無所受命近代說者曰葢䘮父而無兄者也女之䘮父無兄者多矣何罪而見絶於人如此其非先王之意明矣姑以此思之或二三年或七八年儻得其說則知先儒說經其已通者未必皆當其未通者未嘗不可致思也汸退而思之女之喪父無兄者誠不當與逆亂刑疾之子同棄于世久之乃得其說曰此蓋宋桓夫人許穆夫人之類爾故曰無所受命註猶未失也若喪父而無兄則朞功之親皆得為之主矣嘗以質於先生先生曰子能如是求之甚善然六經疑義若此者衆矣當務完養而慎思之毋輕發也遂授以求春秋之要曰楚殺其大夫得臣此書法也當求之於二百四十二年之内夫人姜氏如齊師此書法也當求之於二百四十二年之外汸思之經嵗不得其說先生為易置其語曰夫人姜氏如齊師此書法也當求之於二百四十二年之内楚殺其大夫得臣此書法也當求之於二百四十二年之外汸蓋自是始逹春秋筆削之權乃知先生於六經之學以其所自得而敎人者葢如此惟易所謂象外之象則有不可得而盡聞者嗚呼悲夫有遺恨矣謹述先生世家文行大槩與其經學復古之功如右伏惟立言君子以當世斯文為己任者尚克表章之至正十有二年十有一月朔學生新安趙汸狀
